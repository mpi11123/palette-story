// 疑似AI: 色カテゴリから組み合わせでタイトルを生成
function shuffle(arr, seed=0) {
  const a=[...arr]; let s=seed+1;
  for(let i=a.length-1;i>0;i--){s=(s*1664525+1013904223)&0xffffffff;const j=Math.abs(s)%(i+1);[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function getColorCategory(colors) {
  if (!colors.length) return 'neutral';
  const avg=colors.reduce((a,hex)=>[
    a[0]+parseInt(hex.slice(1,3),16),
    a[1]+parseInt(hex.slice(3,5),16),
    a[2]+parseInt(hex.slice(5,7),16)
  ],[0,0,0]).map(v=>v/colors.length);
  const sat=getSat(avg);
  if(sat<0.1) return 'neutral';
  const h=Math.round(getHue(avg)*360);
  if(h<=30||h>=330) return 'pink';
  if(h<=75) return 'warm';
  if(h<=165) return 'green';
  if(h<=270) return 'blue';
  return 'pink';
}

// 抽出した色のHEXから日本語・英語の色名を返す
function getColorLabel(hex, lang) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b);
  const sat=mx===0?0:(mx-mn)/mx;
  const br=(r*299+g*587+b*114)/1000;
  const hue=mx===mn?0:mx===r?((g-b)/(mx-mn)+6)%6:mx===g?(b-r)/(mx-mn)+2:(r-g)/(mx-mn)+4;
  const h=Math.round(hue/6*360);
  if(sat<0.1){
    if(br>220) return lang==='ja'?['白','透明感のある','ミルキーな']:['White','Ivory','Milky'];
    if(br>160) return lang==='ja'?['グレー','スモーキーな','霞のような']:['Gray','Smoky','Misty'];
    return lang==='ja'?['黒','ダークな','深い']:['Black','Dark','Deep'];
  }
  if(h<=30||h>=330){
    if(br>200) return lang==='ja'?['ピンク','ローズ','桜色の']:['Pink','Rose','Blush'];
    if(br>130) return lang==='ja'?['テラコッタ','珊瑚色の','コーラル']:['Terracotta','Coral','Dusty Rose'];
    return lang==='ja'?['レッド','深紅の','クリムゾン']:['Red','Crimson','Burgundy'];
  }
  if(h<=75){
    if(br>200) return lang==='ja'?['イエロー','バター色の','レモン']:['Yellow','Butter','Lemon'];
    if(br>130) return lang==='ja'?['アンバー','キャラメルの','マスタード']:['Amber','Caramel','Mustard'];
    return lang==='ja'?['ブラウン','チョコレートの','コーヒー']:['Brown','Chocolate','Coffee'];
  }
  if(h<=165){
    if(br>200) return lang==='ja'?['グリーン','セージ','ミント']:['Green','Sage','Mint'];
    if(br>130) return lang==='ja'?['オリーブ','フォレスト','深緑']:['Olive','Forest','Fern'];
    return lang==='ja'?['ダークグリーン','深緑','苔色']:['Dark Green','Moss','Forest'];
  }
  if(h<=255){
    if(br>200) return lang==='ja'?['ブルー','スカイ','水色']:['Blue','Sky','Powder Blue'];
    if(br>130) return lang==='ja'?['ブルー','スレート','デニム']:['Blue','Slate','Denim'];
    return lang==='ja'?['ネイビー','インディゴ','深藍']:['Navy','Indigo','Deep Blue'];
  }
  if(br>200) return lang==='ja'?['ラベンダー','ライラック','紫']:['Lavender','Lilac','Violet'];
  return lang==='ja'?['パープル','プラム','バイオレット']:['Purple','Plum','Violet'];
}

function generateTitles(cat, lang, seed, count=4, extractedColors=[]) {
  // ── 1. 抽出色ベースのタイトル ──
  const colorTitles = [];
  for (const hex of extractedColors) {
    const labels = getColorLabel(hex, lang);
    if (lang==='ja') {
      const moods = ['のきおく','のじかん','のいろ','のひとひら','のひとこと','がすき','がかわいい','の午後','の空気','のかけら'];
      const adjs2 = ['やさしい','ふわりとした','淡い','すきな','小さな'];
      for (const l of labels) {
        for (const m of moods.slice(0,3)) colorTitles.push(l+m);
        for (const a of adjs2.slice(0,2)) colorTitles.push(a+l);
      }
    } else {
      const moods = ['Memory','Moment','Story','Mood','Note','Color','Day','Feeling'];
      const adjs2 = ['Soft','Gentle','Little','Sweet','Quiet'];
      for (const l of labels) {
        for (const m of moods.slice(0,3)) colorTitles.push(l+' '+m);
        for (const a of adjs2.slice(0,2)) colorTitles.push(a+' '+l);
      }
    }
  }

  // ── 2. 汎用タイトル（どんな写真にも合う）──
  const universal = lang==='ja'
    ? ['今日のいろ','小さな幸せ','ひとやすみ','きょうのかけら','なんでもない日','すきなもの','余白の時間','ちいさなきろく','いつかのきおく','そのままで','ひとときの','ゆっくりと','たいせつなもの','日々のいろ','きれいなもの','ふとしたとき','やわらかな日','ちいさなこと','いろのきろく','毎日のいろ']
    : ['Color Story','Daily Notes','Little Moments','Soft Life','Color Diary','Just This','Slow Morning','Color Memory','Everyday','Tiny Record','Color Notes','Still Life','Color Palette','My Colors','Color Mood'];

  // ── 3. 混ぜてシャッフル（色ベース2〜3個＋汎用1〜2個）──
  const colorPicked = shuffle([...new Set(colorTitles)], seed).slice(0, count*2);
  const univPicked  = shuffle(universal, seed+1).slice(0, count);
  const all = shuffle([...colorPicked, ...univPicked], seed+2);
  const unique = [...new Set(all)].slice(0, count*3);

  if (lang==='en') {
    // 英語タイトルに日本語訳を添える
    // 抽出色の英語ラベル→日本語ラベルのマップを作る
    const enToJa = {};
    for (const hex of extractedColors) {
      const jaLabels = getColorLabel(hex, 'ja');
      const enLabels = getColorLabel(hex, 'en');
      enLabels.forEach((en,i)=>{ if(jaLabels[i]) enToJa[en]=jaLabels[i]; });
    }
    // 汎用訳
    const univJa = {
      'Color Story':'色の物語','Daily Notes':'日々の記録','Little Moments':'ちいさなひとときの',
      'Soft Life':'やわらかな暮らし','Color Diary':'色日記','Just This':'そのままで',
      'Slow Morning':'ゆっくりとした朝','Color Memory':'色のきおく','Everyday':'日常',
      'Tiny Record':'ちいさな記録','Color Notes':'色メモ','Still Life':'静物',
      'Color Palette':'カラーパレット','My Colors':'わたしのいろ','Color Mood':'色の気分',
    };
    return shuffle(unique, seed+3).slice(0,count).map(title=>{
      // 1. タイトル全体が辞書にある → その訳を使う
      if (univJa[title]) return {title, ja:`（${univJa[title]}）`};
      // 2. 各単語を個別に訳す（色名など）
      const words = title.split(' ');
      const jaWords = words.map(w=>enToJa[w]).filter(Boolean);
      const ja = jaWords.length ? `（${jaWords.join('')}）` : '';
      return {title, ja};
    });
  }
  return shuffle(unique, seed+3).slice(0,count).map(t=>({title:t, ja:''}));
}

// COLOR UTILITIES
// ─────────────────────────────────────────────
function dist(a, b) { return (a[0]-b[0])**2+(a[1]-b[1])**2+(a[2]-b[2])**2; }
function toHex(r,g,b) { return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join(''); }
function soften(r,g,b) { return toHex(r+(255-r)*.5,g+(255-g)*.5,b+(255-b)*.5); }

function kmeans(px, k, seed=0) {
  const step=Math.floor(px.length/k);
  const off=(seed*17)%Math.max(1,px.length);
  let c=Array.from({length:k},(_,i)=>px[(off+i*step)%px.length]||[128,128,128]);
  for (let t=0;t<15;t++) {
    const cl=Array.from({length:k},()=>[]);
    for (const p of px) { let b=0,bd=Infinity; for (let i=0;i<k;i++){const d=dist(p,c[i]);if(d<bd){bd=d;b=i;}} cl[b].push(p); }
    c=cl.map(g=>{if(!g.length)return[128,128,128];const a=[0,0,0];for(const p of g){a[0]+=p[0];a[1]+=p[1];a[2]+=p[2];}return a.map(v=>Math.round(v/g.length));});
  }
  return c;
}

function getHue([r,g,b]) {
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b);
  if(mx===mn) return 0;
  return mx===r?(g-b)/(mx-mn)/6+(g<b?1:0):mx===g?(b-r)/(mx-mn)/6+1/3:(r-g)/(mx-mn)/6+2/3;
}
function getSat([r,g,b]) { const mx=Math.max(r,g,b),mn=Math.min(r,g,b);return mx===0?0:(mx-mn)/mx; }
function getBr([r,g,b]) { return (r*299+g*587+b*114)/1000; }

function pick3(px, strategy=0) {
  if (!px.length) return [];

  // xorshift32
  let s = ((strategy + 1) * 1664525 + 1013904223) >>> 0;
  if (!s) s = 1;
  const rng = () => { s^=s<<13; s^=s>>>17; s^=s<<5; return (s>>>0)/4294967296; };

  const getHue = ([r,g,b]) => {
    const mx=Math.max(r,g,b), mn=Math.min(r,g,b);
    if (mx===mn) return -1;
    return mx===r?((g-b)/(mx-mn)+6)%6:mx===g?(b-r)/(mx-mn)+2:(r-g)/(mx-mn)+4;
  };
  const getSat = ([r,g,b]) => { const mx=Math.max(r,g,b),mn=Math.min(r,g,b); return mx===0?0:(mx-mn)/mx; };
  const isNeutral = (p) => getSat(p) < 0.12; // 白・黒・グレー判定

  // ピクセルをシャッフル
  const shuffled = px.slice();
  for (let i=shuffled.length-1; i>0; i--) {
    const j=Math.floor(rng()*(i+1));
    [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];
  }

  // 有彩色を優先して2色、無彩色は最大1色
  const sel = [];
  let neutralCount = 0;

  for (const p of shuffled) {
    if (sel.length >= 3) break;
    const neutral = isNeutral(p);
    if (neutral && neutralCount >= 1) continue; // 無彩色は1色まで

    const h = getHue(p);
    const tooClose = sel.some(s2 => {
      const h2 = getHue(s2);
      if (h<0||h2<0) return false;
      const hd=Math.abs(h-h2);
      return Math.min(hd,6-hd)<0.5;
    });
    if (!tooClose) {
      sel.push(p);
      if (neutral) neutralCount++;
    }
  }

  // 足りなければ補充
  for (const p of shuffled) {
    if (sel.length>=3) break;
    if (!sel.includes(p)) sel.push(p);
  }

  // 彩度を少しブースト（くすみ感を軽減、最大+15%）
  return sel.map(([r,g,b]) => {
    const mx=Math.max(r,g,b), mn=Math.min(r,g,b);
    if (mx===0 || mx===mn) return toHex(r,g,b); // 無彩色はそのまま
    const sat = (mx-mn)/mx;
    const boost = Math.min(1, sat + 0.15); // 彩度+15%
    const scale = boost/sat;
    // 彩度ブースト: 各チャンネルをmaxに近づける
    const nr = Math.round(mx - (mx-r)*scale);
    const ng = Math.round(mx - (mx-g)*scale);
    const nb = Math.round(mx - (mx-b)*scale);
    return toHex(nr,ng,nb);
  });
}


function colorName(hex) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const br=getBr([r,g,b]),sat=getSat([r,g,b]);
  const h=Math.round(getHue([r,g,b])*360);
  if(sat<.08){if(br>220)return'IVORY';if(br>160)return'GREY';return'CHARCOAL';}
  if(h<=30||h>=330){if(br>190)return'BLUSH';if(br>120)return'TERRACOTTA';return'CRIMSON';}
  if(h<=75){if(br>190)return'PEACH';if(br>120)return'AMBER';return'BROWN';}
  if(h<=150){if(br>190)return'SAGE';if(br>110)return'OLIVE';return'FOREST';}
  if(h<=255){if(br>190)return'SKY';if(br>120)return'BLUE';return'NAVY';}
  if(h<=300){if(br>190)return'PERIWINKLE';return'INDIGO';}
  return br>190?'LILAC':'MAUVE';
}

const INK='#667A8C', CARD_BG='#FAFAF8';

function drawMinimalChip(ctx, x, y, colors) {
  const CS=20,GAP=5,PD=9,LH=22;
  const W=CS*3+GAP*2+PD*2, H=CS+LH+PD*2;
  ctx.save();ctx.shadowColor='rgba(0,0,0,.1)';ctx.shadowBlur=6;ctx.shadowOffsetY=2;
  ctx.fillStyle=CARD_BG;ctx.fillRect(x,y,W,H);ctx.restore();
  ctx.strokeStyle='rgba(0,0,0,.07)';ctx.lineWidth=.6;ctx.strokeRect(x,y,W,H);
  colors.forEach((hex,i)=>{
    const cx=x+PD+i*(CS+GAP);
    ctx.fillStyle=hex;ctx.fillRect(cx,y+PD,CS,CS);
    ctx.strokeStyle='rgba(0,0,0,.06)';ctx.lineWidth=.4;ctx.strokeRect(cx,y+PD,CS,CS);
    ctx.fillStyle=INK;ctx.font=`4.5px 'Courier New',monospace`;
    ctx.textAlign='center';ctx.textBaseline='alphabetic';
    ctx.fillText(hex.toUpperCase(),cx+CS/2,y+PD+CS+14);
  });
}

function drawPantoneCard(ctx, x, y, colors) {
  const CW=52,CH=78,GAP=5;  // 少し横長・縦を抑える
  const colorH=Math.round(CH*0.65),labelH=CH-colorH; // 色65%・ラベル35%
  colors.forEach((hex,i)=>{
    const cx=x+i*(CW+GAP),cy=y;
    ctx.save();ctx.shadowColor='rgba(0,0,0,.1)';ctx.shadowBlur=6;ctx.shadowOffsetY=2;
    ctx.fillStyle=CARD_BG;ctx.fillRect(cx,cy,CW,CH);ctx.restore();
    ctx.fillStyle=hex;ctx.fillRect(cx,cy,CW,colorH);
    ctx.fillStyle=CARD_BG;ctx.fillRect(cx,cy+colorH,CW,labelH);
    ctx.strokeStyle='rgba(0,0,0,.07)';ctx.lineWidth=.5;ctx.strokeRect(cx,cy,CW,CH);
    const name=colorName(hex).split(' ');
    ctx.fillStyle=INK;ctx.font=`bold 5.5px sans-serif`;
    ctx.textAlign='left';ctx.textBaseline='alphabetic';
    ctx.fillText(name[0]||'',cx+4,cy+colorH+8);
    if(name[1])ctx.fillText(name[1],cx+4,cy+colorH+16);
    ctx.fillStyle=INK;ctx.globalAlpha=.55;ctx.font=`4.5px 'Courier New',monospace`;
    ctx.fillText(hex.toUpperCase(),cx+4,cy+CH-4);ctx.globalAlpha=1;
  });
}

function drawSlimLabel(ctx, x, y, colors) {
  const SW=12,PD=8,rowH=20,W=160,H=rowH*3+PD*2;
  ctx.save();ctx.shadowColor='rgba(0,0,0,.1)';ctx.shadowBlur=6;ctx.shadowOffsetY=2;
  ctx.fillStyle=CARD_BG;ctx.fillRect(x,y,W,H);ctx.restore();
  ctx.strokeStyle='rgba(0,0,0,.07)';ctx.lineWidth=.5;ctx.strokeRect(x,y,W,H);
  colors.forEach((hex,i)=>{
    const ry=y+PD+i*rowH;
    ctx.fillStyle=hex;ctx.fillRect(x+PD,ry+4,SW,SW);
    ctx.strokeStyle='rgba(0,0,0,.06)';ctx.lineWidth=.4;ctx.strokeRect(x+PD,ry+4,SW,SW);
    ctx.fillStyle=INK;ctx.font=`5px sans-serif`;ctx.textAlign='left';ctx.textBaseline='alphabetic';
    ctx.fillText(colorName(hex),x+PD+SW+6,ry+13);
    ctx.globalAlpha=.65;ctx.font=`4.5px 'Courier New',monospace`;ctx.textAlign='right';
    ctx.fillText(hex.toUpperCase(),x+W-PD,ry+13);ctx.globalAlpha=1;
  });
}

function getCardDims(style) {
  if(style==='minimal') return{w:20*3+5*2+9*2,h:20+22+9*2};
  if(style==='pantone') return{w:52*3+5*2,h:78};
  return{w:160,h:20*3+8*2};
}

function wrapText(ctx, text, maxW) {
  const chars=text.split(''),lines=[]; let cur='';
  for(const c of chars){
    if(c==='\n'){lines.push(cur);cur='';continue;}
    const t=cur+c;
    if(ctx.measureText(t).width>maxW&&cur){lines.push(cur);cur=c;}else cur=t;
  }
  if(cur)lines.push(cur);return lines;
}

// ─────────────────────────────────────────────
// CANVAS CONSTANTS
// ─────────────────────────────────────────────
const OUT_W=1080, OUT_H=1920;
const CW=405, CH=720;
const SCALE=OUT_W/CW;
const PAD=Math.round(CW*0.1);
const DPR = typeof window!=='undefined' ? (window.devicePixelRatio||2) : 2;

// ─────────────────────────────────────────────
// MAIN COMPONENT
// ─────────────────────────────────────────────
function PaletteStory() {
  const previewRef = useRef(null);
  const hiddenRef  = useRef(null);
  const fileRef    = useRef(null);
  const cropCvRef  = useRef(null);
  const dragRef    = useRef({active:false,mode:'new',handle:null,startX:0,startY:0,c0:null});

  // ── state ──
  const [img,      setImg]      = useState(null);
  const [pixels,   setPixels]   = useState([]);
  const [colors,   setColors]   = useState([]);
  const [bgColor,  setBgColor]  = useState('#F5F2EE');
  const [bgSugs,   setBgSugs]   = useState([]);
  const [selBg,    setSelBg]    = useState(null);
  const [strategy, setStrategy] = useState(0);
  const [colorHistory, setColorHistory] = useState([]); // [{colors, bgColor}]
  const [photoSize,setPhotoSize]= useState('M');
  const [fitMode,  setFitMode]  = useState('contain'); // 'contain' | 'trim'
  const [crop,     setCrop]     = useState(null);      // image coords
  const [finalCrop,setFinalCrop]= useState(null);
  const [showCrop, setShowCrop] = useState(false);
  const [cardStyle,setCardStyle]= useState('pantone');
  const [cardAlign,setCardAlign]= useState('right');  // left|center|right
  const [font,     setFont]     = useState("'Playfair Display', serif");
  const [titleTxt, setTitleTxt] = useState('');
  const [bodyTxt,  setBodyTxt]  = useState('');
  const [titleAlign,setTitleAlign]=useState('left');
  const [bodyAlign, setBodyAlign] =useState('left');
  const [titleLang,setTitleLang]= useState('ja');
  const [titleSeed,setTitleSeed]= useState(0);
  const [suggestions,setSuggestions]=useState([]);
  const [showSugg, setShowSugg] = useState(false);
  const [tab,      setTab]      = useState('photo');
  const [showFullPreview,setShowFullPreview]=useState(false);
  // canvas直接編集用
  const [titlePos,setTitlePos]=useState({snap:'left',offsetY:0});   // snap: left|center|right
  const [bodyPos,setBodyPos]=useState({snap:'left',offsetY:20});
  const canvasDragRef=useRef({active:false,target:null,startX:0,startY:0,startOffsetY:0});
  const [cardScale,setCardScale]= useState(90);      // 80-120%
  const [textOffset,setTextOffset]=useState(20);     // 0-80px
  const [titleFont,setTitleFont]= useState("'Playfair Display', serif");
  const [bodyFont, setBodyFont] = useState("'DM Sans', sans-serif");
  const [titleSize,setTitleSize]= useState(24);
  const [bodySize, setBodySize] = useState(15);
  const [titleColor,setTitleColor]=useState('#3D4458');
  const [bodyColor, setBodyColor] =useState('rgba(61,68,88,0.72)');
  const [bodyBold,  setBodyBold]  =useState(false);

  // ── file upload ──
  const handleFile = (e) => {
    const f=e.target.files[0]; if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const i=new Image();
      i.onload=()=>{
        setImg(i);
        setColors([]); setStrategy(0); setFinalCrop(null); setCrop(null);
        setFitMode('contain'); setShowCrop(false);
        // ピクセル抽出を同時実行
        // 200x200で高解像度サンプリング（色情報を保持）
        const hc=hiddenRef.current, hx=hc.getContext('2d');
        hc.width=200; hc.height=200; hx.drawImage(i,0,0,200,200);
        const d=hx.getImageData(0,0,200,200).data;
        const px=[];
        for(let j=0;j<d.length;j+=4){
          if(d[j+3]<128)continue;
          px.push([d[j],d[j+1],d[j+2]]);
        }
        setPixels(px);
      };
      i.src=ev.target.result;
    };
    reader.readAsDataURL(f);
  };

  // ── color extract ──
  const extract=(s,px=pixels)=>{
    if(!px.length)return;
    const c3=pick3(px,s);
    const bgs=c3.map(hex=>{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return soften(r,g,b);});
    setColors(c3); setBgSugs(bgs); setSelBg(bgs[0]); setBgColor(bgs[0]);
    // 履歴に追加（類似色セットは除外、最大8件）
    setColorHistory(prev=>{
      const key=c3.join(',');
      // 完全一致は除外
      if(prev.some(h=>h.key===key)) return prev;
      // 色が全部似てる場合も除外（各色のRGB距離が全て50未満なら重複）
      const isSimilar = prev.some(h=>
        h.colors.every((hc,i)=>{
          const [r1,g1,b1]=[parseInt(hc.slice(1,3),16),parseInt(hc.slice(3,5),16),parseInt(hc.slice(5,7),16)];
          const [r2,g2,b2]=[parseInt(c3[i].slice(1,3),16),parseInt(c3[i].slice(3,5),16),parseInt(c3[i].slice(5,7),16)];
          return Math.abs(r1-r2)<40&&Math.abs(g1-g2)<40&&Math.abs(b1-b2)<40;
        })
      );
      if(isSimilar) return prev;
      return [{key,colors:c3,bg:bgs[0]},...prev].slice(0,8);
    });
  };
  const doExtract=()=>{
    setStrategy(0);
    setColorHistory([]); // 新しい写真では履歴リセット
    extract(0);
  };
  const doRetry=()=>{
    const ns=strategy+1; setStrategy(ns); extract(ns);
  };

  // ── title suggestions (疑似AI生成) ──
  const genSugg=()=>{
    const cat=getColorCategory(colors);
    const ns=titleSeed+1; setTitleSeed(ns);
    setSuggestions(generateTitles(cat,titleLang,ns,4,colors));
    setShowSugg(true);
  };

  // ── photo layout calculation ──
  // Returns {photoX, photoY, photoW, photoH, photoSrcW, photoSrcH}
  // All in canvas (CW/CH) coordinates
  const calcPhotoLayout = useCallback(() => {
    const maxW = CW * PHOTO_SIZES[photoSize];
    const maxH = CW * PHOTO_SIZES[photoSize] * 1.2; // 縦はやや大きめ

    if (!img) {
      // 空状態: Large相当の仮エリア
      const ph=Math.round(CW*PHOTO_SIZES['L']*0.9);
      return { photoX:(CW-CW*PHOTO_SIZES['L'])/2, photoY:PAD, photoW:CW*PHOTO_SIZES['L'], photoH:ph, srcW:0, srcH:0 };
    }

    let srcW, srcH;
    if (finalCrop && finalCrop.w>10) {
      srcW=finalCrop.w; srcH=finalCrop.h;
    } else {
      srcW=img.width; srcH=img.height;
    }

    // contain: 縦横比維持、maxW/maxHに収める
    const scale = Math.min(maxW/srcW, maxH/srcH);
    const photoW = srcW*scale;
    const photoH = srcH*scale;
    const photoX = (CW-photoW)/2;
    const photoY = PAD;

    return { photoX, photoY, photoW, photoH, srcW, srcH };
  }, [img, finalCrop, photoSize]);

  // ── main render ──
  const render = useCallback(() => {
    const cv=previewRef.current; if(!cv)return;
    const ctx=cv.getContext('2d');
    ctx.setTransform(1,0,0,1,0,0); // リセット
    ctx.clearRect(0,0,CW*2,CH*2);
    ctx.scale(2,2); // Retina対応
    ctx.fillStyle=bgColor; ctx.fillRect(0,0,CW,CH);

    // photoLayout インライン計算
    const _maxW=CW*PHOTO_SIZES[photoSize], _maxH=CW*PHOTO_SIZES[photoSize]*1.2;
    let photoX,photoY,photoW,photoH;
    photoX=(CW-CW*PHOTO_SIZES[photoSize])/2; photoY=PAD;
    if(!img){
      photoW=CW*PHOTO_SIZES[photoSize]; photoH=Math.round(CW*PHOTO_SIZES['L']*0.9);
    }else{
      let srcW=img.width,srcH=img.height;
      if(finalCrop&&finalCrop.w>10){srcW=finalCrop.w;srcH=finalCrop.h;}
      const _sc=Math.min(_maxW/srcW,_maxH/srcH);
      photoW=srcW*_sc; photoH=srcH*_sc;
      photoX=(CW-photoW)/2; photoY=PAD;
    }
    const photoBtm=photoY+photoH;

    // 写真描画
    if (!img) {
      // 背景（薄いウォームグレー）
      ctx.fillStyle='rgba(0,0,0,.04)'; ctx.fillRect(photoX,photoY,photoW,photoH);
      // 点線枠
      ctx.save();
      ctx.strokeStyle='rgba(0,0,0,.18)'; ctx.lineWidth=1.5;
      ctx.setLineDash([6,5]); ctx.strokeRect(photoX+1,photoY+1,photoW-2,photoH-2);
      ctx.restore();
      // ＋ 大きく
      ctx.fillStyle='rgba(0,0,0,.22)'; ctx.font=`bold 36px sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('＋', photoX+photoW/2, photoY+photoH/2-16);
      // Add Photo
      ctx.fillStyle='rgba(0,0,0,.22)'; ctx.font=`500 15px 'Plus Jakarta Sans',sans-serif`;
      ctx.fillText('Add Photo', photoX+photoW/2, photoY+photoH/2+22);
    } else {
      if (finalCrop && finalCrop.w>10) {
        // トリミング: crop範囲をそのまま、さらに切らない
        ctx.drawImage(img, finalCrop.x,finalCrop.y,finalCrop.w,finalCrop.h, photoX,photoY,photoW,photoH);
      } else {
        // そのまま: contain表示
        ctx.drawImage(img, photoX,photoY,photoW,photoH);
      }
    }

    // カラーカード（cardScaleで拡縮）
    let cardBtm = photoBtm;
    if (colors.length===3) {
      const sc=cardScale/100;
      const {w:cW0,h:cH0}=getCardDims(cardStyle);
      const cW=cW0*sc, cH=cH0*sc;
      // Left: 左下にはみ出す, Center: 中央, Right: 右下にはみ出す
      const OUTSET=cW*0.30; // カードの30%を外にはみ出す（雑誌風）
      let cx;
      if(cardAlign==='left') cx=photoX-OUTSET;
      else if(cardAlign==='right') cx=photoX+photoW-cW+OUTSET;
      else cx=photoX+(photoW-cW)/2;
      // キャンバス外に出ないよう自動補正
      cx=Math.max(2, Math.min(CW-cW-2, cx));
      // 重なり量: カードの上30%が写真に重なる
      const cy=photoBtm-Math.round(cH*0.30);
      // scaleしてから描画
      ctx.save();
      ctx.translate(cx,cy);
      ctx.scale(sc,sc);
      if(cardStyle==='minimal') drawMinimalChip(ctx,0,0,colors);
      else if(cardStyle==='pantone') drawPantoneCard(ctx,0,0,colors);
      else drawSlimLabel(ctx,0,0,colors);
      ctx.restore();
      cardBtm=cy+cH;
    }

    // テキスト（textOffsetで位置調整、個別フォント/サイズ/カラー）
    const textY=Math.max(photoBtm,cardBtm)+32+textOffset;
    const textW=CW-PAD*2;
    let curY=textY;

    // タイトル（空なら描画しない）
    let titleBaseY=curY;
    if (titleTxt.trim()) {
      // snapからX位置を計算
      const tSnap=titlePos.snap||titleAlign;
      const taX=tSnap==='center'?CW/2:tSnap==='left'?PAD:CW-PAD;
      const tY=curY+titlePos.offsetY;
      ctx.fillStyle=titleColor; ctx.font=`${titleSize}px ${titleFont}`;
      ctx.textAlign=tSnap; ctx.textBaseline='alphabetic';
      const tlines=wrapText(ctx,titleTxt.trim(),textW);
      tlines.forEach(l=>{ctx.fillText(l,taX,tY+tlines.indexOf(l)*titleSize*1.4);});
      titleBaseY=tY+tlines.length*titleSize*1.4+20;
      curY=titleBaseY;
      // 選択枠（デバッグ用は省略）
    }
    // 本文（空なら描画しない）
    if (bodyTxt.trim()) {
      const bSnap=bodyPos.snap||bodyAlign;
      const baX=bSnap==='center'?CW/2:bSnap==='left'?PAD:CW-PAD;
      const bY=titleBaseY+bodyPos.offsetY;
      ctx.fillStyle=bodyColor; const bw=bodyBold===true?700:400; ctx.font=`${bw} ${bodySize}px ${bodyFont}`;
      ctx.textAlign=bSnap; ctx.textBaseline='alphabetic';
      const blines=wrapText(ctx,bodyTxt.trim(),textW);
      blines.forEach((l,i)=>{ctx.fillText(l,baX,bY+i*bodySize*1.7);});
    }
    // 両方空ならガイド

  },[img,bgColor,colors,cardStyle,cardAlign,cardScale,photoSize,finalCrop,titleFont,bodyFont,titleSize,bodySize,titleColor,bodyColor,bodyBold,titleTxt,bodyTxt,titleAlign,bodyAlign,textOffset,titlePos,bodyPos]);

  useEffect(()=>{render();},[render]);

  // ── crop canvas draw ──
  const drawCropCanvas=useCallback(()=>{
    const cc=cropCvRef.current; if(!cc||!img)return;
    const ctx=cc.getContext('2d');
    cc.width=img.width; cc.height=img.height;
    ctx.drawImage(img,0,0);
    if(!crop||crop.w<5||crop.h<5)return;
    ctx.fillStyle='rgba(0,0,0,.4)'; ctx.fillRect(0,0,img.width,img.height);
    ctx.clearRect(crop.x,crop.y,crop.w,crop.h);
    ctx.drawImage(img,crop.x,crop.y,crop.w,crop.h,crop.x,crop.y,crop.w,crop.h);
    const lw=Math.max(2,img.width/120);
    ctx.strokeStyle='#fff'; ctx.lineWidth=lw; ctx.strokeRect(crop.x,crop.y,crop.w,crop.h);
    // 内側に移動ヒント（小さいアイコン）
    if(crop.w>60&&crop.h>60){
      ctx.fillStyle='rgba(255,255,255,.55)';
      ctx.font=`${Math.max(14,Math.min(crop.w,crop.h)/6)}px sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('✦',crop.x+crop.w/2,crop.y+crop.h/2);
    }
    const hr=Math.max(18,img.width/18);
    [[crop.x,crop.y],[crop.x+crop.w,crop.y],[crop.x,crop.y+crop.h],[crop.x+crop.w,crop.y+crop.h]].forEach(([hx,hy])=>{
      ctx.beginPath();ctx.arc(hx,hy,hr,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,.12)';ctx.lineWidth=lw*.5;ctx.stroke();
    });
  },[img,crop]);

  useEffect(()=>{if(showCrop)drawCropCanvas();},[showCrop,drawCropCanvas]);

  // ── crop interactions ──
  useEffect(()=>{
    const cc=cropCvRef.current; if(!cc||!showCrop||!img)return;
    const toImg=(cx,cy)=>{const r=cc.getBoundingClientRect();return{x:(cx-r.left)*(img.width/r.width),y:(cy-r.top)*(img.height/r.height)};};
    const cl=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
    const HR=Math.max(40,img.width/14);
    const hitH=(ix,iy)=>{
      if(!crop||crop.w<5)return null;
      const pts=[{id:'tl',x:crop.x,y:crop.y},{id:'tr',x:crop.x+crop.w,y:crop.y},{id:'bl',x:crop.x,y:crop.y+crop.h},{id:'br',x:crop.x+crop.w,y:crop.y+crop.h}];
      for(const h of pts){if(Math.hypot(ix-h.x,iy-h.y)<HR)return h.id;}return null;
    };
    const onDown=(cx,cy)=>{
      const pos=toImg(cx,cy); const d=dragRef.current;
      const h=hitH(pos.x,pos.y);
      if(h){d.active=true;d.mode='handle';d.handle=h;d.startX=pos.x;d.startY=pos.y;d.c0={...crop};}
      else if(crop&&crop.w>10&&pos.x>=crop.x&&pos.x<=crop.x+crop.w&&pos.y>=crop.y&&pos.y<=crop.y+crop.h){
        d.active=true;d.mode='move';d.handle=null;d.startX=pos.x;d.startY=pos.y;d.c0={...crop};
      }else{d.active=true;d.mode='new';d.handle=null;d.startX=cl(pos.x,0,img.width);d.startY=cl(pos.y,0,img.height);setCrop({x:d.startX,y:d.startY,w:0,h:0});}
    };
    const onMove=(cx,cy)=>{
      const d=dragRef.current; if(!d.active)return;
      const pos=toImg(cx,cy); const iw=img.width,ih=img.height,MIN=30;
      if(d.mode==='move'){
        const dx=pos.x-d.startX, dy=pos.y-d.startY;
        const c0=d.c0;
        setCrop({x:cl(c0.x+dx,0,iw-c0.w),y:cl(c0.y+dy,0,ih-c0.h),w:c0.w,h:c0.h});
      }else if(d.mode==='new'){
        const x=cl(Math.min(d.startX,pos.x),0,iw),y=cl(Math.min(d.startY,pos.y),0,ih);
        setCrop({x,y,w:cl(Math.abs(pos.x-d.startX),0,iw-x),h:cl(Math.abs(pos.y-d.startY),0,ih-y)});
      }else{
        const c0=d.c0,dx=pos.x-d.startX,dy=pos.y-d.startY;
        let{x,y,w,h}=c0;
        if(d.handle==='tl'){x=cl(c0.x+dx,0,c0.x+c0.w-MIN);y=cl(c0.y+dy,0,c0.y+c0.h-MIN);w=c0.x+c0.w-x;h=c0.y+c0.h-y;}
        if(d.handle==='tr'){w=cl(c0.w+dx,MIN,iw-c0.x);y=cl(c0.y+dy,0,c0.y+c0.h-MIN);h=c0.y+c0.h-y;}
        if(d.handle==='bl'){x=cl(c0.x+dx,0,c0.x+c0.w-MIN);w=c0.x+c0.w-x;h=cl(c0.h+dy,MIN,ih-c0.y);}
        if(d.handle==='br'){w=cl(c0.w+dx,MIN,iw-c0.x);h=cl(c0.h+dy,MIN,ih-c0.y);}
        setCrop({x,y,w,h});
      }
    };
    const onUp=()=>{dragRef.current.active=false;dragRef.current.handle=null;};
    const mD=e=>{e.preventDefault();onDown(e.clientX,e.clientY);};
    const mM=e=>{if(!dragRef.current.active)return;e.preventDefault();onMove(e.clientX,e.clientY);};
    const tS=e=>{e.preventDefault();e.stopPropagation();const t=e.touches[0];onDown(t.clientX,t.clientY);};
    const tM=e=>{e.preventDefault();e.stopPropagation();if(!dragRef.current.active)return;const t=e.touches[0];onMove(t.clientX,t.clientY);};
    cc.addEventListener('mousedown',mD,{passive:false});window.addEventListener('mousemove',mM,{passive:false});window.addEventListener('mouseup',onUp);
    cc.addEventListener('touchstart',tS,{passive:false});window.addEventListener('touchmove',tM,{passive:false});window.addEventListener('touchend',onUp);
    return()=>{
      cc.removeEventListener('mousedown',mD);window.removeEventListener('mousemove',mM);window.removeEventListener('mouseup',onUp);
      cc.removeEventListener('touchstart',tS);window.removeEventListener('touchmove',tM);window.removeEventListener('touchend',onUp);
    };
  },[showCrop,img,crop]);

  // ── save (iPhone Safari対応) ──
  const save=()=>{
    // 保存用canvasに実寸(1080x1920)で描画
    const sv=document.createElement('canvas');
    sv.width=OUT_W; sv.height=OUT_H;
    const ctx=sv.getContext('2d');
    ctx.scale(SCALE,SCALE);

    // プレビューcanvasの内容をそのままスケール
    ctx.drawImage(previewRef.current,0,0,CW,CH,0,0,CW,CH);

    const dataUrl=sv.toDataURL('image/png');
    const win=window.open('','_blank');
    if(win){
      win.document.write(`<!DOCTYPE html><html><head><title>palette story</title><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{margin:0;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:12px;}img{max-width:100%;max-height:85vh;object-fit:contain;}p{color:rgba(255,255,255,.55);font-size:13px;font-family:sans-serif;margin:0;letter-spacing:.04em;}</style></head><body><img src="${dataUrl}"/><p>長押しして「写真に追加」または保存</p></body></html>`);
      win.document.close();
    }else{
      const a=document.createElement('a');a.download='palette-story.png';a.href=dataUrl;document.body.appendChild(a);a.click();document.body.removeChild(a);
    }
  };

  // ── UI helpers ──
  const C={bg:'#F7F3FA',ink:'#3D4458',sub:'#8A90A0',accent:'#C8A8C8',border:'#E7DDEA',panel:'#FFFFFF',accentSoft:'#E8DDF0',cardInk:'#667A8C'};
  const PBtn=({onClick,disabled,children,full=true,style={}})=>(
    <button onClick={onClick} disabled={disabled} style={{padding:'12px 16px',background:disabled?'#E0D8E8':'#C8A8C8',color:disabled?'rgba(255,255,255,.6)':'#fff',border:'none',borderRadius:10,fontFamily:'inherit',fontSize:'.84rem',fontWeight:500,cursor:disabled?'default':'pointer',width:full?'100%':'auto',letterSpacing:'.03em',...style}}>{children}</button>
  );
  const SBtn=({onClick,active,children,full=true,style={}})=>(
    <button onClick={onClick} style={{padding:'10px 12px',background:active?'#EEE5F5':'#fff',color:active?'#3D4458':C.cardInk,border:`1.5px solid ${active?'#D9C7E3':C.border}`,borderRadius:10,fontFamily:'inherit',fontSize:'.78rem',cursor:'pointer',width:full?'100%':'auto',transition:'all .12s',...style}}>{children}</button>
  );
  const Lbl=({t,sub:s})=>(
    <div style={{marginBottom:7,marginTop:14,display:'flex',alignItems:'baseline',gap:6}}>
      <span style={{fontSize:'.58rem',letterSpacing:'.12em',textTransform:'uppercase',color:C.sub}}>{t}</span>
      {s&&<span style={{fontSize:'.56rem',color:'rgba(138,144,160,.65)',letterSpacing:'.02em'}}>{s}</span>}
    </div>
  );

  const TABS=[
    {id:'photo',label:'Photo',sub:'写真',done:!!img},
    {id:'color',label:'Color',sub:'カラー',done:colors.length>0},
    {id:'card',label:'Card',sub:'カード',done:colors.length>0},
    {id:'title',label:'Title',sub:'タイトル',done:titleTxt.trim().length>0},
    {id:'body',label:'Body',sub:'本文',done:bodyTxt.trim().length>0},
  ];

  return(
    <div style={{background:'#F7F3FA',fontFamily:"'DM Sans',sans-serif",height:'100vh',maxWidth:480,margin:'0 auto',display:'flex',flexDirection:'column',overflow:'hidden',position:'relative',color:'#fff'}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&family=Caveat:wght@400;600&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Shippori+Mincho:wght@400;600&family=Zen+Old+Mincho:wght@400;600&family=Zen+Maru+Gothic:wght@400;500&family=Zen+Kaku+Gothic+New:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap');
        *{box-sizing:border-box;}
        select,textarea{padding:9px 11px;border:1.5px solid #E7DDEA;border-radius:10px;font-size:.84rem;font-family:inherit;color:#3D4458;background:#FFFFFF;outline:none;width:100%;resize:none;}
        select option{background:#fff;color:#3D4458;}
        select:focus,textarea:focus{border-color:#C8A8C8;}
        textarea::placeholder{color:#B8B0C8;}
        input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;background:#E7DDEA;outline:none;}
        input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#C8A8C8;cursor:pointer;}
        input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#C8A8C8;cursor:pointer;border:none;}
      `}</style>

      <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleFile}/>

      {/* ── 全画面プレビュー ── */}
      <div style={{flex:1,position:'relative',overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center',background:'#EDE8F2'}}
        onClick={()=>{if(!img)fileRef.current.click();}}>

        <canvas ref={previewRef} width={CW*2} height={CH*2}
          style={{height:'100%',width:'auto',aspectRatio:'9/16',display:'block',maxWidth:'100%',touchAction:'none'}}/>



        {/* ロゴ＋アクション（上部オーバーレイ） */}
        <div style={{position:'absolute',top:0,left:0,right:0,padding:'14px 16px',background:'linear-gradient(to bottom,rgba(247,243,250,.9),transparent)',display:'flex',justifyContent:'space-between',alignItems:'center',pointerEvents:'none'}}>
          <span style={{fontFamily:"'Plus Jakarta Sans','DM Sans',sans-serif",fontWeight:600,fontSize:'1rem',color:'#fff',letterSpacing:'.01em',opacity:.85}}>
            palette story<span style={{color:'#C8A8C8'}}>.</span>
          </span>
          <div style={{display:'flex',gap:7,pointerEvents:'auto'}}>
            {img&&(
              <button onClick={()=>setShowFullPreview(true)}
                style={{padding:'5px 14px',background:'rgba(255,255,255,.88)',color:'#3D4458',border:'none',borderRadius:14,fontFamily:'inherit',fontSize:'.72rem',fontWeight:500,cursor:'pointer'}}>
                Preview
              </button>
            )}
            {img&&colors.length>0&&(
              <button onClick={save}
                style={{padding:'5px 14px',background:'#C8A8C8',color:'#fff',border:'none',borderRadius:14,fontFamily:'inherit',fontSize:'.7rem',fontWeight:500,cursor:'pointer'}}>
                Save
              </button>
            )}
          </div>
        </div>
      </div>

      {/* ── Bottom Tab Bar + Sheet ── */}
      <div style={{flexShrink:0,background:'#FFFFFF',borderTop:'1px solid #E7DDEA'}}>

        {/* シートパネル */}
        {tab&&(
          <div style={{padding:'6px 18px 16px',overflowY:'auto',maxHeight:'44vh',borderBottom:'1px solid #E7DDEA'}}>
            <div style={{width:32,height:3,background:'#D9C7E3',borderRadius:2,margin:'0 auto 14px'}}/>

            {tab==='photo'&&(
              <div>
                {!img?(
                  <div style={{paddingTop:8,textAlign:'center',color:'rgba(255,255,255,.35)',fontSize:'.8rem',letterSpacing:'.04em'}}>
                    プレビューをタップして写真を追加
                  </div>
                ):(
                  <>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7,marginBottom:10}}>
                      <SBtn onClick={()=>fileRef.current.click()} full={false} style={{width:'100%'}}>Change</SBtn>
                      <SBtn onClick={()=>{setShowCrop(true);setFitMode('trim');}} full={false} style={{width:'100%'}}>Trim ✂️</SBtn>
                    </div>
                    {finalCrop&&<SBtn onClick={()=>{setFitMode('contain');setFinalCrop(null);}} style={{marginBottom:8}}>✕ Remove Trim</SBtn>}
                    <Lbl t="Display" sub="表示方法"/>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7,marginBottom:10}}>
                      <SBtn active={fitMode==='contain'} onClick={()=>{setFitMode('contain');setFinalCrop(null);}}>そのまま</SBtn>
                      <SBtn active={fitMode==='trim'&&!!finalCrop} onClick={()=>setShowCrop(true)}>トリミング</SBtn>
                    </div>
                    <Lbl t="Size" sub="写真サイズ"/>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:7}}>
                      {['S','M','L'].map(k=><SBtn key={k} active={photoSize===k} onClick={()=>setPhotoSize(k)}>{k==='S'?'Small':k==='M'?'Medium':'Large'}</SBtn>)}
                    </div>
                  </>
                )}
              </div>
            )}

            {tab==='color'&&(
              <div>
                {!pixels.length?(
                  <div style={{paddingTop:8,textAlign:'center',color:'rgba(255,255,255,.35)',fontSize:'.78rem'}}>先に写真を選択してください</div>
                ):(
                  <>
                    <PBtn onClick={doExtract} style={{marginBottom:7}}>色を抽出する</PBtn>
                    {colors.length>0&&(
                      <>
                        <SBtn onClick={doRetry} style={{marginBottom:colorHistory.length>1?8:12}}>別の3色を試す {strategy>0?`#${strategy}`:''}</SBtn>
                    {colorHistory.length>1&&(
                      <div style={{marginBottom:12}}>
                        <div style={{fontSize:'.52rem',letterSpacing:'.1em',color:'#8A90A0',textTransform:'uppercase',marginBottom:6}}>履歴 — タップで選択</div>
                        <div style={{display:'flex',flexDirection:'column',gap:5}}>
                          {colorHistory.map((h,i)=>(
                            <button key={h.key} onClick={()=>{setColors(h.colors);setBgColor(h.bg);setSelBg(h.bg);}}
                              style={{display:'flex',gap:4,alignItems:'center',padding:'6px 8px',background:JSON.stringify(h.colors)===JSON.stringify(colors)?'rgba(200,168,200,.2)':'rgba(255,255,255,.05)',border:`1px solid ${JSON.stringify(h.colors)===JSON.stringify(colors)?'rgba(200,168,200,.4)':'rgba(255,255,255,.08)'}`,borderRadius:8,cursor:'pointer',width:'100%'}}>
                              <span style={{fontSize:'.5rem',color:'rgba(255,255,255,.25)',flexShrink:0,width:12}}>#{i+1}</span>
                              {h.colors.map(hex=>(
                                <div key={hex} style={{flex:1,height:18,background:hex}}/>
                              ))}
                            </button>
                          ))}
                        </div>
                      </div>
                    )}
                        <Lbl t="Colors" sub="抽出カラー"/>
                        <div style={{display:'flex',gap:8,marginBottom:12}}>
                          {colors.map(hex=>(
                            <div key={hex} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                              <div style={{width:'100%',height:26,background:hex}}/>
                              <div style={{fontSize:'.44rem',color:'rgba(255,255,255,.4)',fontFamily:'monospace'}}>{hex}</div>
                            </div>
                          ))}
                        </div>
                        <Lbl t="Background" sub="背景色"/>
                        <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap'}}>
                          {bgSugs.map(hex=>(
                            <div key={hex} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
                              <div onClick={()=>{setSelBg(hex);setBgColor(hex);}} style={{width:34,height:34,background:hex,border:`2px solid ${selBg===hex?'#fff':'transparent'}`,cursor:'pointer'}}/>
                              <div style={{fontSize:'.42rem',color:'rgba(255,255,255,.35)',fontFamily:'monospace'}}>{hex}</div>
                            </div>
                          ))}
                        </div>
                        <div style={{display:'flex',gap:10,alignItems:'center',padding:'10px 12px',background:'#F7F3FA',borderRadius:10,border:'1.5px solid #E7DDEA'}}>
                          <div style={{position:'relative',flexShrink:0}}>
                            <div style={{width:36,height:36,borderRadius:8,background:bgColor,border:'2px solid #E7DDEA',boxShadow:'0 1px 4px rgba(0,0,0,.1)'}}/>
                            <input type="color" value={bgColor} onChange={e=>{setBgColor(e.target.value);setSelBg(null);}} style={{position:'absolute',inset:0,opacity:0,width:'100%',height:'100%',cursor:'pointer'}}/>
                          </div>
                          <div>
                            <div style={{fontSize:'.6rem',color:'#8A90A0',marginBottom:2}}>カスタム背景色</div>
                            <div style={{fontSize:'.7rem',fontFamily:'monospace',color:'#3D4458',fontWeight:500}}>{bgColor}</div>
                          </div>
                          <div style={{marginLeft:'auto',fontSize:'.68rem',color:'#C8A8C8'}}>タップで変更</div>
                        </div>
                      </>
                    )}
                  </>
                )}
              </div>
            )}

            {tab==='card'&&(
              <div>
                <Lbl t="Style" sub="スタイル"/>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:7,marginBottom:10}}>
                  {[['minimal','Minimal\nChip'],['pantone','Color\nTag'],['slim','Slim\nLabel']].map(([v,l])=>(
                    <SBtn key={v} active={cardStyle===v} onClick={()=>setCardStyle(v)} full={false} style={{width:'100%',whiteSpace:'pre-line',lineHeight:1.3,padding:'9px 4px'}}>{l}</SBtn>
                  ))}
                </div>
                <Lbl t="Position" sub="左右位置"/>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:7,marginBottom:10}}>
                  {[['left','Left'],['center','Center'],['right','Right']].map(([v,l])=>(
                    <SBtn key={v} active={cardAlign===v} onClick={()=>setCardAlign(v)}>{l}</SBtn>
                  ))}
                </div>
                <Lbl t="Card Size" sub={`${cardScale}%`}/>
                <input type="range" min={70} max={120} value={cardScale} onInput={e=>setCardScale(Number(e.target.value))} onChange={e=>setCardScale(Number(e.target.value))} style={{marginBottom:8}}/>
                {colors.length===0&&<div style={{padding:'9px',background:'rgba(255,255,255,.05)',borderRadius:8,color:'rgba(255,255,255,.3)',fontSize:'.74rem',textAlign:'center',marginTop:6}}>先に色を抽出してください</div>}
              </div>
            )}

            {tab==='title'&&(
              <div>
                <div style={{background:'#FBF7FD',borderRadius:14,padding:'12px',marginBottom:12,border:'1px solid #E8DDF0'}}>
                  <div style={{fontSize:'.54rem',letterSpacing:'.12em',textTransform:'uppercase',color:'#8A90A0',marginBottom:8}}>Title Ideas タイトル提案</div>
                  <div style={{display:'flex',gap:6,marginBottom:showSugg?8:0}}>
                    <PBtn onClick={genSugg} style={{flex:1}}>タイトル提案</PBtn>
                    <button onClick={()=>setTitleLang(l=>l==='ja'?'en':'ja')}
                    style={{display:'flex',alignItems:'center',gap:0,borderRadius:10,overflow:'hidden',border:'1.5px solid #E7DDEA',flexShrink:0,cursor:'pointer',fontFamily:'inherit',fontSize:'.72rem',fontWeight:500}}>
                    <span style={{padding:'9px 11px',background:titleLang==='ja'?'#C8A8C8':'#F7F3FA',color:titleLang==='ja'?'#fff':'#8A90A0',transition:'all .15s'}}>JP</span>
                    <span style={{padding:'9px 11px',background:titleLang==='en'?'#C8A8C8':'#F7F3FA',color:titleLang==='en'?'#fff':'#8A90A0',transition:'all .15s'}}>EN</span>
                  </button>
                  </div>
                  {showSugg&&(
                    <div style={{marginTop:6}}>
                      {suggestions.map((item,i)=>{
                    const t=typeof item==='object'?item.title:item;
                    const ja=typeof item==='object'?item.ja:'';
                    return(
                      <button key={i} onClick={()=>{setTitleTxt(t);setShowSugg(false);}}
                        style={{display:'block',width:'100%',padding:'9px 12px',marginBottom:i<suggestions.length-1?6:0,background:'#F7F3FA',border:'1px solid #E7DDEA',borderRadius:9,textAlign:'left',cursor:'pointer',fontFamily:'inherit'}}>
                        <div style={{fontSize:'.84rem',color:'#3D4458',fontWeight:500}}>{t}</div>
                        {ja&&<div style={{fontSize:'.66rem',color:'#8A90A0',marginTop:2}}>{ja}</div>}
                      </button>
                    );
                  })
                  }
                  <button onClick={genSugg} style={{display:'block',width:'100%',padding:'7px',marginTop:8,background:'none',border:'none',fontSize:'.7rem',cursor:'pointer',fontFamily:'inherit',color:'#8A90A0',textAlign:'center'}}>もう一度</button>
                </div>
              )}
            </div>
            <textarea
            rows={2} placeholder="タイトル…" value={titleTxt} onChange={e=>setTitleTxt(e.target.value)} style={{marginBottom:8}}/>
            <select value={titleFont} onChange={e=>setTitleFont(e.target.value)} style={{marginBottom:7}}>
              {FONTS.map((f,i)=><option key={i} value={f.value||''} disabled={f.disabled}>{f.label}</option>)}
            </select>
            <div style={{display:'flex',gap:7,alignItems:'center',marginBottom:8}}>
              <span style={{fontSize:'.58rem',color:'#8A90A0',flexShrink:0}}>{titleSize}px</span>
              <input type="range" min={16} max={44} value={titleSize} onInput={e=>setTitleSize(Number(e.target.value))} onChange={e=>setTitleSize(Number(e.target.value))} style={{flex:1}}/>
              <input type="color" value={titleColor} onChange={e=>setTitleColor(e.target.value)} style={{width:28,height:28,border:'1px solid #E7DDEA',borderRadius:5,padding:1,cursor:'pointer',background:'none',flexShrink:0}}/>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6}}>
              {[['left','Left'],['center','Center'],['right','Right']].map(([v,l])=>(
                <button key={v} onClick={()=>{setTitleAlign(v);setTitlePos(p=>({...p,snap:v}));}} style={{padding:'8px 0',background:titleAlign===v?'#EEE5F5':'#fff',color:titleAlign===v?'#3D4458':'#8A90A0',border:`1.5px solid ${titleAlign===v?'#D9C7E3':'#E7DDEA'}`,borderRadius:10,fontFamily:'inherit',fontSize:'.74rem',cursor:'pointer'}}>{l}</button>
              ))}
            </div>
          </div>
        )}

            {tab==='body'&&(
              <div>
                <textarea rows={3} placeholder={"ひとこと、日付、ハッシュタグなど…"} value={bodyTxt} onChange={e=>setBodyTxt(e.target.value)} style={{marginBottom:8}}/>
                <select value={bodyFont} onChange={e=>setBodyFont(e.target.value)} style={{marginBottom:7}}>
                  {FONTS.map((f,i)=><option key={i} value={f.value||''} disabled={f.disabled}>{f.label}</option>)}
                </select>
                <div style={{display:'flex',gap:7,alignItems:'center',marginBottom:8}}>
                  <span style={{fontSize:'.56rem',color:'rgba(255,255,255,.35)',flexShrink:0}}>{bodySize}px</span>
                  <input type="range" min={11} max={28} value={bodySize} onInput={e=>setBodySize(Number(e.target.value))} onChange={e=>setBodySize(Number(e.target.value))} style={{flex:1}}/>
                  <input type="color" value={typeof bodyColor==='string'&&bodyColor.startsWith('#')?bodyColor:'#fff'} onChange={e=>setBodyColor(e.target.value)} style={{width:26,height:26,border:'1px solid rgba(255,255,255,.2)',borderRadius:5,padding:1,cursor:'pointer',background:'none',flexShrink:0}}/>
                </div>
                <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:10}}>
                  <button onClick={()=>setBodyBold(b=>!b)} style={{padding:'7px 14px',background:bodyBold?'#EEE5F5':'#fff',color:bodyBold?'#3D4458':'#8A90A0',border:`1.5px solid ${bodyBold?'#D9C7E3':'#E7DDEA'}`,borderRadius:8,fontFamily:'inherit',fontSize:'.74rem',fontWeight:bodyBold?600:400,cursor:'pointer',transition:'all .15s',flexShrink:0}}>
                    Bold {bodyBold?'ON':'OFF'}
                  </button>
                  <span style={{fontSize:'.58rem',color:'rgba(255,255,255,.25)'}}>{bodyBold?'太字':'標準'}</span>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6,marginBottom:10}}>
                  {[['left','Left'],['center','Center'],['right','Right']].map(([v,l])=>(
                    <button key={v} onClick={()=>{setBodyAlign(v);setBodyPos(p=>({...p,snap:v}));}} style={{padding:'8px 0',background:bodyAlign===v?'#EEE5F5':'#fff',color:bodyAlign===v?'#3D4458':'#8A90A0',border:`1.5px solid ${bodyAlign===v?'#D9C7E3':'#E7DDEA'}0,168,200,.4)':'rgba(255,255,255,.1)'}`,borderRadius:10,fontFamily:'inherit',fontSize:'.74rem',cursor:'pointer'}}>{l}</button>
                  ))}
                </div>
                <Lbl t="Position" sub={`+${textOffset}px`}/>
                <input type="range" min={0} max={80} value={textOffset} onInput={e=>setTextOffset(Number(e.target.value))} onChange={e=>setTextOffset(Number(e.target.value))} style={{marginBottom:10}}/>
                {colors.length>0&&(
                  <>
                    <Lbl t="Color" sub="写真から色選択"/>
                    <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:4}}>
                      {[...colors,...bgSugs,'#3D4458','#FFFFFF'].map((hex,i)=>(
                        <div key={i} onClick={()=>{setTitleColor(hex);setBodyColor(hex);}} style={{width:26,height:26,background:hex,border:'1px solid rgba(255,255,255,.15)',cursor:'pointer'}} title={hex}/>
                      ))}
                    </div>
                  </>
                )}
              </div>
            )}
          </div>
        )}

        {/* タブ一覧 */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',borderTop:'1px solid rgba(255,255,255,.07)'}}>
          {TABS.map(({id,label,sub,done})=>(
            <button key={id} onClick={()=>setTab(tab===id?null:id)}
              style={{padding:'10px 0 10px',border:'none',background:'none',cursor:'pointer',fontFamily:'inherit',display:'flex',flexDirection:'column',alignItems:'center',gap:2,borderTop:`2px solid ${tab===id?'#C8A8C8':'transparent'}`,marginTop:-1}}>
              {done&&tab!==id&&<span style={{fontSize:'.42rem',color:'#C8A8C8',fontWeight:700,lineHeight:1}}>✓</span>}
              <span style={{fontSize:'.7rem',color:tab===id?'#3D4458':'#8A90A0',fontWeight:tab===id?600:400,letterSpacing:'.02em'}}>{label}</span>
              <span style={{fontSize:'.48rem',color:tab===id?'#8A90A0':'#B8B0C8',letterSpacing:'.02em'}}>{sub}</span>
            </button>
          ))}
        </div>
      </div>

      {/* Full Preview modal */}
      {showFullPreview&&(
        <div style={{position:'fixed',inset:0,background:'#111',display:'flex',flexDirection:'column',zIndex:400}}
          onClick={()=>setShowFullPreview(false)}>
          <div style={{flexShrink:0,display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 20px'}}>
            <span style={{color:'rgba(255,255,255,.5)',fontSize:'.65rem',letterSpacing:'.06em'}}>Full Preview <span style={{opacity:.6,fontSize:'.58rem'}}>完成プレビュー</span></span>
            <button onClick={()=>setShowFullPreview(false)}
              style={{padding:'6px 16px',background:'rgba(255,255,255,.12)',color:'#fff',border:'1px solid rgba(255,255,255,.2)',borderRadius:16,fontFamily:'inherit',fontSize:'.76rem',cursor:'pointer'}}>
              Close ✕
            </button>
          </div>
          <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',padding:'0 12px 20px'}}
            onClick={e=>e.stopPropagation()}>
            <canvas
              width={CW} height={CH}
              ref={el=>{
                if(!el||!previewRef.current)return;
                requestAnimationFrame(()=>{
                  if(!previewRef.current)return;
                  // previewのcanvasを等倍でコピー（ぼやけない）
                  el.width=CW;el.height=CH;
                  el.style.width='';el.style.height='';
                  el.getContext('2d').drawImage(previewRef.current,0,0,CW,CH);
                });
              }}
              style={{maxWidth:'100%',maxHeight:'100%',aspectRatio:'9/16',display:'block',boxShadow:'0 0 40px rgba(0,0,0,.5)'}}
            />
          </div>
        </div>
      )}
      {/* Crop modal */}
      {showCrop&&img&&(
        <div style={{position:'fixed',inset:0,background:'#111',display:'flex',flexDirection:'column',zIndex:300,touchAction:'none'}}>
          <div style={{padding:'14px 20px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
            <span style={{color:'#fff',fontFamily:"'Cormorant Garamond',serif",fontStyle:'italic',fontSize:'1.1rem'}}>Trim Photo</span>
            <span style={{color:'rgba(255,255,255,.38)',fontSize:'.62rem',letterSpacing:'.07em'}}>DRAG · CORNERS TO RESIZE</span>
          </div>
          <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',minHeight:0}}>
            <canvas ref={cropCvRef} style={{maxWidth:'100%',maxHeight:'100%',display:'block',touchAction:'none'}}/>
          </div>
          <div style={{padding:'14px 20px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,flexShrink:0}}>
            <button onClick={()=>{setFitMode('contain');setFinalCrop(null);setShowCrop(false);}}
              style={{padding:'13px',border:'1px solid rgba(255,255,255,.2)',borderRadius:10,background:'transparent',color:'rgba(255,255,255,.7)',fontSize:'.84rem',cursor:'pointer',fontFamily:'inherit'}}>
              そのまま使う
            </button>
            <button onClick={()=>{if(crop&&crop.w>10){setFinalCrop(crop);setFitMode('trim');setShowCrop(false);}}}
              disabled={!crop||crop.w<10}
              style={{padding:'13px',background:crop&&crop.w>10?'#fff':'rgba(255,255,255,.15)',color:crop&&crop.w>10?'#1A1A1A':'rgba(255,255,255,.3)',border:'none',borderRadius:10,fontSize:'.84rem',cursor:crop&&crop.w>10?'pointer':'default',fontFamily:'inherit',fontWeight:500}}>
              Apply ✓
            </button>
          </div>
        </div>
      )}

      <canvas ref={hiddenRef} style={{display:'none'}}/>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<PaletteStory />);
</script>
</body>
</html>
