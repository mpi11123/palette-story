// 疑似AI: 色カテゴリから組み合わせでタイトルを生成
function shuffle(arr, seed=0) {
  const a=[...arr]; let s=seed+1;
  for(let i=a.length-1;i>0;i--){s=(s*1664525+1013904223)&0xffffffff;const j=Math.abs(s)%(i+1);[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function getColorCategory(colors) {
  if (!colors.length) return 'neutral';
  const avg=colors.reduce((a,hex)=>[
    a[0]+parseInt(hex.slice(1,3),16),
    a[1]+parseInt(hex.slice(3,5),16),
    a[2]+parseInt(hex.slice(5,7),16)
  ],[0,0,0]).map(v=>v/colors.length);
  const sat=getSat(avg);
  if(sat<0.1) return 'neutral';
  const h=Math.round(getHue(avg)*360);
  if(h<=30||h>=330) return 'pink';
  if(h<=75) return 'warm';
  if(h<=165) return 'green';
  if(h<=270) return 'blue';
  return 'pink';
}

// 抽出した色のHEXから日本語・英語の色名を返す
function getColorLabel(hex, lang) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b);
  const sat=mx===0?0:(mx-mn)/mx;
  const br=(r*299+g*587+b*114)/1000;
  const hue=mx===mn?0:mx===r?((g-b)/(mx-mn)+6)%6:mx===g?(b-r)/(mx-mn)+2:(r-g)/(mx-mn)+4;
  const h=Math.round(hue/6*360);
  if(sat<0.1){
    if(br>220) return lang==='ja'?['白','透明感のある','ミルキーな']:['White','Ivory','Milky'];
    if(br>160) return lang==='ja'?['グレー','スモーキーな','霞のような']:['Gray','Smoky','Misty'];
    return lang==='ja'?['黒','ダークな','深い']:['Black','Dark','Deep'];
  }
  if(h<=30||h>=330){
    if(br>200) return lang==='ja'?['ピンク','ローズ','桜色の']:['Pink','Rose','Blush'];
    if(br>130) return lang==='ja'?['テラコッタ','珊瑚色の','コーラル']:['Terracotta','Coral','Dusty Rose'];
    return lang==='ja'?['レッド','深紅の','クリムゾン']:['Red','Crimson','Burgundy'];
  }
  if(h<=75){
    if(br>200) return lang==='ja'?['イエロー','バター色の','レモン']:['Yellow','Butter','Lemon'];
    if(br>130) return lang==='ja'?['アンバー','キャラメルの','マスタード']:['Amber','Caramel','Mustard'];
    return lang==='ja'?['ブラウン','チョコレートの','コーヒー']:['Brown','Chocolate','Coffee'];
  }
  if(h<=165){
    if(br>200) return lang==='ja'?['グリーン','セージ','ミント']:['Green','Sage','Mint'];
    if(br>130) return lang==='ja'?['オリーブ','フォレスト','深緑']:['Olive','Forest','Fern'];
    return lang==='ja'?['ダークグリーン','深緑','苔色']:['Dark Green','Moss','Forest'];
  }
  if(h<=255){
    if(br>200) return lang==='ja'?['ブルー','スカイ','水色']:['Blue','Sky','Powder Blue'];
    if(br>130) return lang==='ja'?['ブルー','スレート','デニム']:['Blue','Slate','Denim'];
    return lang==='ja'?['ネイビー','インディゴ','深藍']:['Navy','Indigo','Deep Blue'];
  }
  if(br>200) return lang==='ja'?['ラベンダー','ライラック','紫']:['Lavender','Lilac','Violet'];
  return lang==='ja'?['パープル','プラム','バイオレット']:['Purple','Plum','Violet'];
}

function generateTitles(cat, lang, seed, count=4, extractedColors=[]) {
  // ── 1. 抽出色ベースのタイトル ──
  const colorTitles = [];
  for (const hex of extractedColors) {
    const labels = getColorLabel(hex, lang);
    if (lang==='ja') {
      const moods = ['のきおく','のじかん','のいろ','のひとひら','のひとこと','がすき','がかわいい','の午後','の空気','のかけら'];
      const adjs2 = ['やさしい','ふわりとした','淡い','すきな','小さな'];
      for (const l of labels) {
        // ラベル末尾の「の」を除去して助詞重複を防ぐ（例：キャラメルの+のじかん→キャラメルのじかん）
        const base = l.endsWith('の') ? l.slice(0,-1) : l;
        for (const m of moods.slice(0,3)) colorTitles.push(base+m);
        for (const a of adjs2.slice(0,2)) colorTitles.push(a+base);
      }
    } else {
      const moods = ['Memory','Moment','Story','Mood','Note','Color','Day','Feeling'];
      const adjs2 = ['Soft','Gentle','Little','Sweet','Quiet'];
      for (const l of labels) {
        for (const m of moods.slice(0,3)) colorTitles.push(l+' '+m);
        for (const a of adjs2.slice(0,2)) colorTitles.push(a+' '+l);
      }
    }
  }

  // ── 2. 汎用タイトル（どんな写真にも合う）──
  const universal = lang==='ja'
    ? ['今日のいろ','小さな幸せ','ひとやすみ','きょうのかけら','なんでもない日','すきなもの','余白の時間','ちいさなきろく','いつかのきおく','そのままで','ひとときの','ゆっくりと','たいせつなもの','日々のいろ','きれいなもの','ふとしたとき','やわらかな日','ちいさなこと','いろのきろく','毎日のいろ']
    : ['Color Story','Daily Notes','Little Moments','Soft Life','Color Diary','Just This','Slow Morning','Color Memory','Everyday','Tiny Record','Color Notes','Still Life','Color Palette','My Colors','Color Mood'];

  // ── 3. 混ぜてシャッフル（色ベース2〜3個＋汎用1〜2個）──
  const colorPicked = shuffle([...new Set(colorTitles)], seed).slice(0, count*2);
  const univPicked  = shuffle(universal, seed+1).slice(0, count);
  const all = shuffle([...colorPicked, ...univPicked], seed+2);
  const unique = [...new Set(all)].slice(0, count*3);

  if (lang==='en') {
    // 英語タイトルに日本語訳を添える
    // 抽出色の英語ラベル→日本語ラベルのマップを作る
    const enToJa = {};
    for (const hex of extractedColors) {
      const jaLabels = getColorLabel(hex, 'ja');
      const enLabels = getColorLabel(hex, 'en');
      enLabels.forEach((en,i)=>{ if(jaLabels[i]) enToJa[en]=jaLabels[i]; });
    }
    // 汎用訳
    const univJa = {
      'Color Story':'色の物語','Daily Notes':'日々の記録','Little Moments':'ちいさなひとときの',
      'Soft Life':'やわらかな暮らし','Color Diary':'色日記','Just This':'そのままで',
      'Slow Morning':'ゆっくりとした朝','Color Memory':'色のきおく','Everyday':'日常',
      'Tiny Record':'ちいさな記録','Color Notes':'色メモ','Still Life':'静物',
      'Color Palette':'カラーパレット','My Colors':'わたしのいろ','Color Mood':'色の気分',
    };
    return shuffle(unique, seed+3).slice(0,count).map(title=>{
      // 1. タイトル全体が辞書にある → その訳を使う
      if (univJa[title]) return {title, ja:`（${univJa[title]}）`};
      // 2. 各単語を個別に訳す（色名など）
      const words = title.split(' ');
      const jaWords = words.map(w=>enToJa[w]).filter(Boolean);
      const ja = jaWords.length ? `（${jaWords.join('')}）` : '';
      return {title, ja};
    });
  }
  return shuffle(unique, seed+3).slice(0,count).map(t=>({title:t, ja:''}));
}

// ─────────────────────────────────────────────
// COLOR UTILITIES
// ─────────────────────────────────────────────
function dist(a, b) { return (a[0]-b[0])**2+(a[1]-b[1])**2+(a[2]-b[2])**2; }
function toHex(r,g,b) { return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join(''); }
function soften(r,g,b) { return toHex(r+(255-r)*.5,g+(255-g)*.5,b+(255-b)*.5); }

function kmeans(px, k, seed=0) {
  const step=Math.floor(px.length/k);
  const off=(seed*17)%Math.max(1,px.length);
  let c=Array.from({length:k},(_,i)=>px[(off+i*step)%px.length]||[128,128,128]);
  for (let t=0;t<15;t++) {
    const cl=Array.from({length:k},()=>[]);
    for (const p of px) { let b=0,bd=Infinity; for (let i=0;i<k;i++){const d=dist(p,c[i]);if(d<bd){bd=d;b=i;}} cl[b].push(p); }
    c=cl.map(g=>{if(!g.length)return[128,128,128];const a=[0,0,0];for(const p of g){a[0]+=p[0];a[1]+=p[1];a[2]+=p[2];}return a.map(v=>Math.round(v/g.length));});
  }
  return c;
}

function getHue([r,g,b]) {
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b);
  if(mx===mn) return 0;
  return mx===r?(g-b)/(mx-mn)/6+(g<b?1:0):mx===g?(b-r)/(mx-mn)/6+1/3:(r-g)/(mx-mn)/6+2/3;
}
function getSat([r,g,b]) { const mx=Math.max(r,g,b),mn=Math.min(r,g,b);return mx===0?0:(mx-mn)/mx; }
function getBr([r,g,b]) { return (r*299+g*587+b*114)/1000; }

function rgbInfo([r,g,b]) {
  const mx=Math.max(r,g,b), mn=Math.min(r,g,b);
  const hue=Math.round(getHue([r,g,b])*360);
  const sat=mx===0?0:(mx-mn)/mx;
  const br=getBr([r,g,b]);
  const light=(mx+mn)/2;
  return {h:hue,s:sat,br,light};
}
function hueDiff(a,b){const d=Math.abs(a-b);return Math.min(d,360-d);}
function toneDistance(a,b){
  const ia=rgbInfo(a), ib=rgbInfo(b);
  return hueDiff(ia.h,ib.h)*2.2 + Math.abs(ia.light-ib.light)*0.55 + Math.abs(ia.s-ib.s)*80;
}

function pick3(px, strategy=0) {
  if (!px.length) return [];

  // くすみ・同系色に寄りすぎないように、面積・彩度・明度・色相のバランスで選ぶ
  const sample = px.filter((_, i) => i % 2 === 0); // 1/2サンプリングで小面積色を逃さない
  const centers = kmeans(sample, 32, strategy * 11 + 5); // クラスター数を増やして小面積の鮮やか色も拾う

  const clusterCount = centers.map(c => ({ c, n: 0 }));
  for (const p of sample) {
    let bi = 0, bd = Infinity;
    for (let i = 0; i < centers.length; i++) {
      const d = dist(p, centers[i]);
      if (d < bd) { bd = d; bi = i; }
    }
    clusterCount[bi].n++;
  }

  const total = Math.max(1, sample.length);
  let scored = clusterCount.map(({c,n}) => {
    const info=rgbInfo(c);
    const area=n/total;
    const tooWhite=info.br>242 && info.s<.12;
    const tooBlack=info.br<24;
    const midLight=1-Math.min(1,Math.abs(info.br-150)/150);
    const accentBoost=info.s*3.2 + (info.s>.4?0.9:0) + (info.s>.6?0.6:0); // 高彩度を大きく優遇
    const areaBoost=Math.sqrt(area)*0.55; // 面積の影響を下げる
    const score=accentBoost + areaBoost + midLight*.22 - (tooWhite||tooBlack?1.2:0);
    return {c,area,score,info};
  }).filter(o=>o.area>.0008 || o.info.s>.4).sort((a,b)=>b.score-a.score); // 鮮やかな色は小面積でも残す

  // retryごとに少し観点を変える
  if (strategy % 4 === 1) scored=scored.slice().sort((a,b)=>b.info.s-a.info.s || b.score-a.score);
  if (strategy % 4 === 2) scored=scored.slice().sort((a,b)=>b.area-a.area || b.info.s-a.info.s);
  if (strategy % 4 === 3) scored=scored.slice().sort((a,b)=>Math.abs(150-a.info.br)-Math.abs(150-b.info.br) || b.info.s-a.info.s);

  const selected=[];
  const isTooSimilar=(c)=>selected.some(s=>{
    const a=rgbInfo(c), b=rgbInfo(s);
    return hueDiff(a.h,b.h)<30 && Math.abs(a.light-b.light)<40;
  });

  // まず高彩度アクセントを1色優先
  const accent=scored.find(o=>o.info.s>.35 && o.info.br>45 && o.info.br<240);
  if(accent) selected.push(accent.c);
  // 2色目：1色目と色相が大きく異なる高彩度色を探す（ピンク・ブルーなど多様な色を拾う）
  if(selected.length===1){
    const first=rgbInfo(selected[0]);
    const second=scored.find(o=>{
      if(selected.includes(o.c))return false;
      return o.info.s>.3 && hueDiff(o.info.h,first.h)>60 && o.info.br>45 && o.info.br<240;
    });
    if(second) selected.push(second.c);
  }

  // 次に、色相・明度が被りにくいものを追加
  for (const o of scored) {
    if(selected.length>=3) break;
    if(selected.includes(o.c)) continue;
    if(isTooSimilar(o.c)) continue;
    selected.push(o.c);
  }

  // まだ足りない場合はトーン距離が遠い順に補充
  for (const o of scored) {
    if(selected.length>=3) break;
    if(selected.includes(o.c)) continue;
    const minD=selected.length?Math.min(...selected.map(s=>toneDistance(o.c,s))):999;
    if(minD>28) selected.push(o.c);
  }
  for (const o of scored) { if(selected.length>=3) break; if(!selected.includes(o.c)) selected.push(o.c); }

  // ほんの少しだけ彩度を整える
  return selected.slice(0,3).map(([r,g,b]) => {
    const mx=Math.max(r,g,b), mn=Math.min(r,g,b);
    if (mx===0 || mx===mn) return toHex(r,g,b);
    const sat=(mx-mn)/mx;
    const boost=Math.min(1, sat + (sat<.35?.16:.08));
    const scale=boost/sat;
    return toHex(mx-(mx-r)*scale, mx-(mx-g)*scale, mx-(mx-b)*scale);
  });
}

// パレット用に多色を抽出（21色）
function pickMany(px, count=21) {
  if (!px.length) return [];
  const sample = px.filter((_, i) => i % 2 === 0);
  const centers = kmeans(sample, Math.max(count+10, 28), 5);
  const clusterCount = centers.map(c => ({ c, n: 0 }));
  for (const p of sample) {
    let bi=0, bd=Infinity;
    for (let i=0;i<centers.length;i++){const d=dist(p,centers[i]);if(d<bd){bd=d;bi=i;}}
    clusterCount[bi].n++;
  }
  const total=Math.max(1,sample.length);
  let scored=clusterCount.map(({c,n})=>{
    const info=rgbInfo(c);
    const area=n/total;
    const tooWhite=info.br>245 && info.s<.10;
    const tooBlack=info.br<20;
    // 彩度と面積のバランス、鮮やかさ優先
    const score=info.s*2.2 + Math.sqrt(area)*0.7 - (tooWhite||tooBlack?1.5:0);
    return {c,area,score,info};
  }).filter(o=>o.area>0.001 && !(o.info.br>248&&o.info.s<.08) && o.info.br>15)
    .sort((a,b)=>b.score-a.score);

  // 色相が近すぎるものを間引いて多様性を出す
  const result=[];
  for(const o of scored){
    if(result.length>=count) break;
    const dup=result.some(r=>{
      const a=r.info,b=o.info;
      return hueDiff(a.h,b.h)<14 && Math.abs(a.light-b.light)<22 && Math.abs(a.s-b.s)<.18;
    });
    if(!dup) result.push(o);
  }
  // 足りなければ間引き基準を緩めて補充
  if(result.length<count){
    for(const o of scored){
      if(result.length>=count) break;
      if(result.includes(o)) continue;
      result.push(o);
    }
  }
  return result.map(o=>toHex(o.c[0],o.c[1],o.c[2]));
}

// 既存のhex配列（パレット）から多様性のある3色を選ぶ。startで開始位置をずらすと違う3色になる
function pickDiverse3(hexes, start=0) {
  if (!hexes.length) return [];
  const items = hexes.map(hex => ({
    hex,
    rgb: [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)]
  }));
  const first = items[((start%items.length)+items.length)%items.length];
  const selected=[first];
  for (const it of items) {
    if (selected.length>=3) break;
    if (selected.includes(it)) continue;
    const minD = Math.min(...selected.map(s=>toneDistance(s.rgb,it.rgb)));
    if (minD>28) selected.push(it);
  }
  for (const it of items) {
    if (selected.length>=3) break;
    if (!selected.includes(it)) selected.push(it);
  }
  return selected.map(it=>it.hex);
}

function colorName(hex, usedNames=null) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const br=getBr([r,g,b]), sat=getSat([r,g,b]);
  const h=Math.round(getHue([r,g,b])*360);

  // ハイブリッド・ネーミング：
  // 1. 各色域に豊富な候補リスト
  // 2. hex値から決定的にインデックスを選ぶ（同じ色→同じ名前、微妙に違う色→違う名前）
  // 3. 被ったら次候補→それでも被れば形容詞を自動付与
  const seed=(r*7+g*13+b*17)%97; // hexから決定的な数値
  const pick=(list)=>{
    const clean=list.map(n=>String(n).toUpperCase());
    const start=seed%clean.length;
    if(!usedNames) return clean[start];
    // startから順に空いてる名前を探す
    for(let i=0;i<clean.length;i++){
      const n=clean[(start+i)%clean.length];
      if(!usedNames.has(n)){ usedNames.add(n); return n; }
    }
    // 全部使われてたら形容詞を付けて自動生成
    const tone = br<75?'DEEP' : br>205?'PALE' : sat<.25?'DUSTY' : 'SOFT';
    let name=`${tone} ${clean[start]}`;
    let i=2;
    while(usedNames.has(name)){ name=`${tone} ${clean[start]} ${i++}`; }
    usedNames.add(name);
    return name;
  };

  if (sat < .08) {
    if (br > 232) return pick(['IVORY','MILK','CLOUD','PEARL','SNOW','CHALK','COTTON','PAPER']);
    if (br > 175) return pick(['MIST','FOG','ASH','DOVE','SILVER','PEBBLE','MOON','FEATHER']);
    if (br > 95) return pick(['STONE','SMOKE','TAUPE','GREIGE','CEMENT','FLINT','SHADOW','PUTTY']);
    return pick(['INK','CHARCOAL','NOIR','GRAPHITE','ONYX','SOOT','RAVEN','COAL']);
  }

  // red / pink
  if (h >= 338 || h < 12) {
    if (sat > .58 && br > 130) return pick(['BERRY','RASPBERRY','CHERRY','POPPY','STRAWBERRY','RUBY','PUNCH','CRANBERRY']);
    if (br > 205) return pick(['BLUSH','PETAL','SAKURA','COTTON CANDY','BABY PINK','SHELL','ROSEWATER','PEONY']);
    if (br > 145) return pick(['ROSE','CORAL','DUSTY ROSE','FLAMINGO','SALMON','TEA ROSE','CAMELLIA','ROUGE']);
    return pick(['CRIMSON','WINE','CHERRY','BURGUNDY','GARNET','MERLOT','BRICK RED','SANGRIA']);
  }

  // coral / terracotta / rust
  if (h < 28) {
    if (sat > .62 && br > 145) return pick(['CORAL','FLAMINGO','POPPY','APRICOT','TANGERINE','PERSIMMON','PAPAYA','SUNSET']);
    if (br > 190) return pick(['PEACH','APRICOT','MELON','CANTALOUPE','NECTAR','SHERBET','CREAMSICLE','BISQUE']);
    if (br < 75) return pick(['ESPRESSO','COCOA','WALNUT','CACAO','MAHOGANY','CHESTNUT','UMBER','TRUFFLE']);
    if (br < 120) return pick(['RUST','CLAY','CINNAMON','BRICK','AUBURN','SIENNA','PAPRIKA','GINGER']);
    return pick(['TERRACOTTA','CINNAMON','CLAY','RUST','ADOBE','CANYON','SPICE','AMBER CLAY']);
  }

  // orange / brown / beige
  if (h < 52) {
    if (br > 210) return pick(['CREAM','BUTTER','VANILLA','OAT','CUSTARD','ALMOND MILK','ECRU','LINEN']);
    if (sat < .30 && br > 165) return pick(['LATTE','BISCUIT','OAT','SAND','ALMOND','BEIGE','TOAST','MUSHROOM']);
    if (br > 145) return pick(['CARAMEL','HONEY','BISCUIT','BUTTERSCOTCH','MAPLE','TOFFEE','GOLDEN','APRICOT JAM']);
    if (br > 95) return pick(['WALNUT','MOCHA','COCOA','CINNAMON','PECAN','HAZELNUT','BRONZE','TAWNY']);
    return pick(['ESPRESSO','CACAO','COFFEE','DARK CHOCOLATE','MAHOGANY','TRUFFLE','UMBER','MOLE']);
  }

  // yellow
  if (h < 76) {
    if (br > 210) return pick(['LEMON','BUTTER','CREAM','VANILLA','CHIFFON','DAFFODIL','BANANA','CUSTARD']);
    if (sat > .45) return pick(['HONEY','MUSTARD','GOLD','AMBER','SAFFRON','MARIGOLD','OCHRE','DIJON']);
    return pick(['SAND','OAT','WHEAT','KHAKI','STRAW','FLAX','DUNE','RATTAN']);
  }

  // green
  if (h < 165) {
    if (br > 205 && sat < .45) return pick(['MINT','SAGE','PISTACHIO','CELERY','HONEYDEW','SEAFOAM','CUCUMBER','MATCHA LATTE']);
    if (br > 180) return pick(['SAGE','MINT','FERN','PISTACHIO','MATCHA','JADE','WILLOW','APPLE']);
    if (sat > .45 && br > 120) return pick(['OLIVE','FERN','HERB','LEAF','BASIL','CLOVER','MEADOW','KALE']);
    if (br > 95) return pick(['MOSS','OLIVE','FOREST','SAGE','JUNIPER','THYME','ARTICHOKE','LICHEN']);
    return pick(['FOREST','PINE','MOSS','EVERGREEN','HUNTER','SPRUCE','SEAWEED','BOTTLE GREEN']);
  }

  // blue / cyan
  if (h < 255) {
    if (br > 218) return pick(['ICE','POWDER','CLOUD','MIST','ARCTIC','FROST','GLACIER','BABY BLUE']);
    if (br > 185) return pick(['SKY','ICE','MIST','POWDER','CORNFLOWER','PERIWINKLE','AQUA','ROBIN EGG']);
    if (sat < .35 && br > 125) return pick(['DENIM','SLATE','DUSK','STEEL','STORM','HARBOR','PEWTER','RAIN']);
    if (br > 95) return pick(['BLUE','OCEAN','DENIM','COBALT','LAGOON','MARINE','CERULEAN','TEAL BLUE']);
    return pick(['NAVY','INDIGO','MIDNIGHT','INK','SAPPHIRE','DEEP SEA','TWILIGHT','ABYSS']);
  }

  // purple
  if (h < 305) {
    if (br > 210) return pick(['LILAC','LAVENDER','VIOLET','WISTERIA','THISTLE','PERIWINKLE','HEATHER','SWEET PEA']);
    if (br > 170) return pick(['LAVENDER','LILAC','MAUVE','VIOLET','AMETHYST','IRIS','CROCUS','HYACINTH']);
    if (sat < .42) return pick(['MAUVE','PLUM','TAUPE','ORCHID GRAY','SMOKY PLUM','FIG','ELDERBERRY','DUSK PURPLE']);
    return pick(['PLUM','VIOLET','GRAPE','ORCHID','AMETHYST','EGGPLANT','MULBERRY','ROYAL PURPLE']);
  }

  // magenta / pink-purple
  if (sat > .55 && br > 135) return pick(['BERRY','MAGENTA','FUCHSIA','ORCHID PINK','AZALEA','BOUGAINVILLEA','PITAYA','HOT PINK']);
  if (br > 205) return pick(['BLUSH','PETAL','LILAC PINK','SAKURA','SWEET LILAC','FAIRY','CANDY','BALLET']);
  if (br > 150) return pick(['ROSE','MAUVE','BERRY','DUSTY ROSE','ORCHID','RASPBERRY MILK','TEA ROSE','MALLOW']);
  return pick(['MAUVE','PLUM','WINE','BERRY','MULBERRY','FIG','BORDEAUX','RAISIN']);
}

const INK='#667A8C', CARD_BG='#FAFAF8';
const CARD_FONT = "'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif";

function drawMinimalChip(ctx, x, y, colors) {
  // Minimal Chip v5:
  // ・HEXが絶対に重ならないよう、1色ごとのカラム幅を固定
  // ・フォントは全カード共通のサンセリフ（Helvetica Neue / Arial / Noto Sans JP）
  // ・角丸なし
  // ・文字が長い場合は自動で少しだけ縮小
  const CS = 36;
  const COL_W = 70;
  const PD_X = 12;
  const PD_Y = 11;
  const LABEL_GAP = 10;
  const LABEL_H = 16;
  const BOTTOM = 11;
  const W = COL_W * 3 + PD_X * 2;
  const H = PD_Y + CS + LABEL_GAP + LABEL_H + BOTTOM;
  const rx = Math.round(x), ry = Math.round(y);

  ctx.save();
  ctx.shadowColor = 'rgba(75,55,92,.12)';
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 2;
  ctx.fillStyle = CARD_BG;
  ctx.fillRect(rx, ry, W, H);
  ctx.restore();

  ctx.strokeStyle = 'rgba(61,68,88,.10)';
  ctx.lineWidth = 1;
  ctx.strokeRect(rx + .5, ry + .5, W - 1, H - 1);

  const drawFitText = (text, cx, y, maxW) => {
    let fs = 10.5;
    ctx.font = `800 ${fs}px ${CARD_FONT}`;
    while (ctx.measureText(text).width > maxW && fs > 8.5) {
      fs -= .5;
      ctx.font = `800 ${fs}px ${CARD_FONT}`;
    }
    ctx.fillText(text, cx, y);
  };

  colors.forEach((hex, i) => {
    const colX = rx + PD_X + i * COL_W;
    const cx = Math.round(colX + COL_W / 2);
    const chipX = Math.round(cx - CS / 2);
    const chipY = Math.round(ry + PD_Y);

    ctx.fillStyle = hex;
    ctx.fillRect(chipX, chipY, CS, CS);
    ctx.strokeStyle = 'rgba(0,0,0,.08)';
    ctx.lineWidth = .8;
    ctx.strokeRect(chipX + .5, chipY + .5, CS - 1, CS - 1);

    ctx.fillStyle = '#3D4458';
    ctx.globalAlpha = .98;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    drawFitText(hex.toUpperCase(), cx, chipY + CS + LABEL_GAP + 10, COL_W - 8);
    ctx.globalAlpha = 1;
  });
}
function fitLabelText(text, maxChars=9) {
  if (!text) return [''];
  if (text.length <= maxChars) return [text];
  if (text.includes(' ')) {
    const parts=text.split(' ');
    return [parts[0].slice(0,maxChars), parts.slice(1).join(' ').slice(0,maxChars)];
  }
  return [text.slice(0, maxChars), text.slice(maxChars, maxChars*2)];
}

function drawPantoneCard(ctx, x, y, colors) {
  const CW=62,CH=84,GAP=6;
  const colorH=Math.round(CH*0.60), labelH=CH-colorH;
  const fitName=(name)=>{
    if(name.length<=8) return [name];
    // スペースがあれば2行に分割
    if(name.includes(' ')){
      const parts=name.split(' ');
      if(parts.length===2) return parts;
      // 3語以上は前半・後半に分ける
      const mid=Math.ceil(parts.length/2);
      return [parts.slice(0,mid).join(' '),parts.slice(mid).join(' ')];
    }
    // 長い1語は半分に分割
    const half=Math.ceil(name.length/2);
    return [name.slice(0,half),name.slice(half)];
  };
  const usedNames=new Set();
  const names=colors.map(hex=>colorName(hex,usedNames));
  colors.forEach((hex,i)=>{
    const cx=Math.round(x+i*(CW+GAP)),cy=Math.round(y);
    ctx.save();ctx.shadowColor='rgba(75,55,92,.14)';ctx.shadowBlur=8;ctx.shadowOffsetY=2;
    ctx.fillStyle=CARD_BG;ctx.fillRect(cx,cy,CW,CH);ctx.restore();
    // 色エリアを内側に入れて白いカードの縁を見せる
    const M=3.5; // 白縁の幅
    ctx.fillStyle=hex;ctx.fillRect(cx+M,cy+M,CW-M*2,colorH-M);
    ctx.strokeStyle='rgba(61,68,88,.10)';ctx.lineWidth=.6;ctx.strokeRect(cx,cy,CW,CH);

    const lines=fitName(names[i]);
    ctx.fillStyle=INK;ctx.font=`800 7.4px ${CARD_FONT}`;
    ctx.textAlign='left';ctx.textBaseline='alphabetic';
    lines.slice(0,2).forEach((line,li)=>ctx.fillText(line,cx+5,cy+colorH+9+li*7.5));

    ctx.fillStyle=INK;ctx.globalAlpha=.98;ctx.font=`800 8px ${CARD_FONT}`;
    ctx.fillText(hex.toUpperCase(),cx+5,cy+CH-5);
    ctx.globalAlpha=1;
  });
}

function drawSlimLabel(ctx, x, y, colors) {
  const SW=15,PD=9,rowH=24,W=178,H=rowH*3+PD*2;
  ctx.save();ctx.shadowColor='rgba(75,55,92,.14)';ctx.shadowBlur=8;ctx.shadowOffsetY=2;
  ctx.fillStyle=CARD_BG;ctx.fillRect(x,y,W,H);ctx.restore();
  ctx.strokeStyle='rgba(61,68,88,.10)';ctx.lineWidth=.6;ctx.strokeRect(x,y,W,H);
  const usedNames=new Set();
  const names=colors.map(hex=>colorName(hex,usedNames));
  colors.forEach((hex,i)=>{
    const ry=Math.round(y+PD+i*rowH);
    ctx.fillStyle=hex;ctx.fillRect(x+PD,ry+4,SW,SW);
    ctx.strokeStyle='rgba(0,0,0,.08)';ctx.lineWidth=.5;ctx.strokeRect(x+PD,ry+4,SW,SW);
    ctx.fillStyle=INK;ctx.font=`800 6.7px ${CARD_FONT}`;ctx.textAlign='left';ctx.textBaseline='alphabetic';
    const nm=names[i];
    // 長い名前は自動でフォント縮小（切り捨てない）
    let nfs=6.7;
    ctx.font=`800 ${nfs}px ${CARD_FONT}`;
    const maxNameW=W-PD*2-SW-7-58; // HEX表示分を除いた幅
    while(ctx.measureText(nm).width>maxNameW && nfs>5.2){nfs-=.3;ctx.font=`800 ${nfs}px ${CARD_FONT}`;}
    ctx.fillText(nm,Math.round(x+PD+SW+7),ry+14);
    ctx.globalAlpha=.98;ctx.font=`800 7.2px ${CARD_FONT}`;ctx.textAlign='right';
    ctx.fillText(hex.toUpperCase(),x+W-PD,ry+14);ctx.globalAlpha=1;
  });
}

function getCardDims(style) {
  if(style==='minimal') return{w:86*3+18*2,h:16+38+14+18+16};
  if(style==='pantone') return{w:62*3+6*2,h:84};
  return{w:178,h:24*3+9*2};
}

function wrapText(ctx, text, maxW) {
  const chars=text.split(''),lines=[]; let cur='';
  for(const c of chars){
    if(c==='\n'){lines.push(cur);cur='';continue;}
    const t=cur+c;
    if(ctx.measureText(t).width>maxW&&cur){lines.push(cur);cur=c;}else cur=t;
  }
  if(cur)lines.push(cur);return lines;
}

  // ── color extract ──

    if(saveHistory && colors.length===3) setColorHistory(prev=>{

      const filtered=prev.filter(h=>h.key!==oldEntry.key);

  const calcPhotoLayout = useCallback(() => {

      srcW=finalCrop.w; srcH=finalCrop.h;
    } else {
      srcW=img.width; srcH=img.height;
    }

    // contain: 縦横比維持、maxW/maxHに収める
    const scale = Math.min(maxW/srcW, maxH/srcH);
    const photoW = srcW*scale;
    const photoH = srcH*scale;
    const photoX = (CW-photoW)/2;
    const photoY = PAD;

    return { photoX, photoY, photoW, photoH, srcW, srcH };
  }, [img, finalCrop, photoSize]);

  // ── main render ──
  const render = useCallback(() => {
    const cv=previewRef.current; if(!cv)return;
    const ctx=cv.getContext('2d');

    ctx.fillStyle=bgColor; ctx.fillRect(0,0,CW,CH);

    // photoLayout インライン計算
    const _maxW=CW*PHOTO_SIZES[photoSize], _maxH=CW*PHOTO_SIZES[photoSize]*1.2;
    let photoX,photoY,photoW,photoH;
    photoX=(CW-CW*PHOTO_SIZES[photoSize])/2; photoY=PAD;
    if(!img){
      photoW=CW*PHOTO_SIZES[photoSize]; photoH=Math.round(CW*PHOTO_SIZES['L']*0.9);
    }else{
      let srcW=img.width,srcH=img.height;

      ctx.save();

      ctx.restore();

      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('＋', photoX+photoW/2, photoY+photoH/2-16);

      ctx.fillStyle='rgba(0,0,0,.22)'; ctx.font=`500 15px 'Plus Jakarta Sans',sans-serif`;
      ctx.fillText('Add Photo', photoX+photoW/2, photoY+photoH/2+22);
    } else {
      if(frameW>0){
        const fx=Math.round(photoX-frameW), fy=Math.round(photoY-frameW);
        const fw=Math.round(photoW+frameW*2), fh=Math.round(photoH+frameW*2);

        ctx.shadowBlur=10;ctx.shadowOffsetY=3;
        ctx.fillStyle='#FFFFFF';ctx.fillRect(fx,fy,fw,fh);
        ctx.restore();
      }
      if (finalCrop && finalCrop.w>10) {
        // トリミング: crop範囲をそのまま、さらに切らない
        ctx.drawImage(img, finalCrop.x,finalCrop.y,finalCrop.w,finalCrop.h, Math.round(photoX),Math.round(photoY),Math.round(photoW),Math.round(photoH));
      } else {
        // そのまま: contain表示
        ctx.drawImage(img, Math.round(photoX),Math.round(photoY),Math.round(photoW),Math.round(photoH));
      }
    }

    // カラーカード（cardScaleで拡縮）
    let cardBtm = photoBtm;
    if (colors.length===3) {
      const sc=cardScale/100;
      const {w:cW0,h:cH0}=getCardDims(cardStyle);
      const cW=cW0*sc, cH=cH0*sc;
      // Left: 左下にはみ出す, Center: 中央, Right: 右下にはみ出す
      const OUTSET=cW*0.30; // カードの30%を外にはみ出す（雑誌風）
      let cx;
      if(cardAlign==='left') cx=photoX-OUTSET;
      else if(cardAlign==='right') cx=photoX+photoW-cW+OUTSET;
      else cx=photoX+(photoW-cW)/2;
      // キャンバス外に出ないよう自動補正
      cx=Math.max(2, Math.min(CW-cW-2, cx));

      const cy=photoBtm-Math.round(cH*0.30);

      ctx.save();
      ctx.translate(cx,cy);
      ctx.scale(sc,sc);
      if(cardStyle==='minimal') drawMinimalChip(ctx,0,0,colors);
      else if(cardStyle==='pantone') drawPantoneCard(ctx,0,0,colors);
      else drawSlimLabel(ctx,0,0,colors);
      ctx.restore();
      cardBtm=cy+cH;
    }

    // テキスト（textOffsetで位置調整、個別フォント/サイズ/カラー）
    const textY=Math.max(photoBtm,cardBtm)+32+textOffset;
    const textW=CW-PAD*2;
    let curY=textY;

    // タイトル（空なら描画しない）
    let titleBaseY=curY;
    if (titleTxt.trim()) {
      // snapからX位置を計算
      const tSnap=titlePos.snap||titleAlign;
      const taX=tSnap==='center'?CW/2:tSnap==='left'?PAD:CW-PAD;
      const tY=curY+titlePos.offsetY;
      ctx.fillStyle=titleColor; const tw=titleBold===true?700:400; ctx.font=`${tw} ${titleSize}px ${titleFont}`;
      ctx.textBaseline='alphabetic';
      const tlines=wrapText(ctx,titleTxt.trim(),textW);
      ctx.textAlign='left';
      tlines.forEach((l,li)=>{
        const lw=ctx.measureText(l).width;
        let lx;
        if(tSnap==='center') lx=CW/2-lw/2;
        else if(tSnap==='right') lx=CW-PAD-lw;
        else lx=PAD;
        ctx.fillText(l,lx,tY+li*titleSize*1.4);

      titleBaseY=tY+tlines.length*titleSize*1.4+20;
      curY=titleBaseY;

    }

    if (bodyTxt.trim()) {
      const bSnap=bodyPos.snap||bodyAlign;
      const bY=titleBaseY+bodyPos.offsetY-bodyGap; // bodyGapでタイトルとの間隔を調整
      ctx.fillStyle=bodyColor; const bw=bodyBold===true?700:400; ctx.font=`${bw} ${bodySize}px ${bodyFont}`;
      ctx.textBaseline='alphabetic';
      const blines=wrapText(ctx,bodyTxt.trim(),textW);
      // textAlignに頼らず各行を手動配置（2行目ズレ防止）
      ctx.textAlign='left';
      blines.forEach((l,i)=>{
        const lw=ctx.measureText(l).width;
        let lx;
        if(bSnap==='center') lx=CW/2-lw/2;
        else if(bSnap==='right') lx=CW-PAD-lw;
        else lx=PAD;
        ctx.fillText(l,lx,bY+i*bodySize*1.7);
      });
    }
    // 両方空ならガイド

  },[img,bgColor,colors,cardStyle,cardAlign,cardScale,photoSize,photoFrame,finalCrop,titleFont,bodyFont,titleSize,bodySize,titleColor,bodyColor,titleBold,bodyBold,bodyGap,titleTxt,bodyTxt,titleAlign,bodyAlign,textOffset,titlePos,bodyPos]);

  useEffect(()=>{render();},[render]);
  // フォント変更時に遅延再描画（Caveat等の読み込み待ち）
  useEffect(()=>{
    const t=setTimeout(()=>render(),200);
    return ()=>clearTimeout(t);
  },[titleFont,bodyFont]);

  // ── crop canvas draw ──
  const drawCropCanvas=useCallback(()=>{
    const cc=cropCvRef.current; if(!cc||!img)return;
    const ctx=cc.getContext('2d');
    cc.width=img.width; cc.height=img.height;
    ctx.drawImage(img,0,0);
    if(!crop||crop.w<5||crop.h<5){
      ctx.fillStyle='rgba(0,0,0,.28)'; ctx.fillRect(0,0,img.width,img.height);
      ctx.fillStyle='rgba(255,255,255,.92)';
      ctx.font=`${Math.max(18,img.width/28)}px sans-serif`;

      ctx.fillText('ドラッグして範囲を作る',img.width/2,img.height/2);
      return;
    }
    ctx.fillStyle='rgba(0,0,0,.4)'; ctx.fillRect(0,0,img.width,img.height);

    ctx.drawImage(img,crop.x,crop.y,crop.w,crop.h,crop.x,crop.y,crop.w,crop.h);
    const lw=Math.max(2,img.width/120);
    ctx.strokeStyle='#fff'; ctx.lineWidth=lw; ctx.strokeRect(crop.x,crop.y,crop.w,crop.h);
    // 内側に移動ヒント（小さいアイコン）
    if(crop.w>60&&crop.h>60){
      ctx.fillStyle='rgba(255,255,255,.55)';
      ctx.font=`${Math.max(14,Math.min(crop.w,crop.h)/6)}px sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('✦',crop.x+crop.w/2,crop.y+crop.h/2);

    [[crop.x,crop.y],[crop.x+crop.w,crop.y],[crop.x,crop.y+crop.h],[crop.x+crop.w,crop.y+crop.h]].forEach(([hx,hy])=>{

  // ── crop interactions ──
  useEffect(()=>{
    const cc=cropCvRef.current; if(!cc||!showCrop||!img)return;
    const toImg=(cx,cy)=>{const r=cc.getBoundingClientRect();return{x:(cx-r.left)*(img.width/r.width),y:(cy-r.top)*(img.height/r.height)};};
    const cl=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
    const HR=Math.max(40,img.width/14);

      for(const h of pts){if(Math.hypot(ix-h.x,iy-h.y)<HR)return h.id;}return null;
    };

      const pos=toImg(cx,cy); const d=dragRef.current;

      else if(crop&&crop.w>10&&pos.x>=crop.x&&pos.x<=crop.x+crop.w&&pos.y>=crop.y&&pos.y<=crop.y+crop.h){

        let{x,y,w,h}=c0;
        if(d.handle==='tl'){x=cl(c0.x+dx,0,c0.x+c0.w-MIN);y=cl(c0.y+dy,0,c0.y+c0.h-MIN);w=c0.x+c0.w-x;h=c0.y+c0.h-y;}

        if(d.handle==='br'){w=cl(c0.w+dx,MIN,iw-c0.x);h=cl(c0.h+dy,MIN,ih-c0.y);}
        setCrop({x,y,w,h});
      }
    };
    const onUp=()=>{dragRef.current.active=false;dragRef.current.handle=null;};
    const mD=e=>{e.preventDefault();onDown(e.clientX,e.clientY);};
    const mM=e=>{if(!dragRef.current.active)return;e.preventDefault();onMove(e.clientX,e.clientY);};
    const tS=e=>{e.preventDefault();e.stopPropagation();const t=e.touches[0];onDown(t.clientX,t.clientY);};
    const tM=e=>{e.preventDefault();e.stopPropagation();if(!dragRef.current.active)return;const t=e.touches[0];onMove(t.clientX,t.clientY);};
    cc.addEventListener('mousedown',mD,{passive:false});window.addEventListener('mousemove',mM,{passive:false});window.addEventListener('mouseup',onUp);
    cc.addEventListener('touchstart',tS,{passive:false});window.addEventListener('touchmove',tM,{passive:false});window.addEventListener('touchend',onUp);

            if(e.touches.length===2){

              const dx=e.touches[0].clientX-e.touches[1].clientX;
              const dy=e.touches[0].clientY-e.touches[1].clientY;

            e.stopPropagation();
          }}
          onTouchMove={(e)=>{
            e.preventDefault();e.stopPropagation();
            const vt=viewTransform.current;
            if(e.touches.length===2&&vt.pinching){
              const dx=e.touches[0].clientX-e.touches[1].clientX;
              const dy=e.touches[0].clientY-e.touches[1].clientY;
              const dist=Math.sqrt(dx*dx+dy*dy);
              vt.scale=Math.max(0.8,Math.min(4,vt.scale*(dist/vt.lastDist)));
              vt.lastDist=dist;setViewScale(vt.scale);
            }else if(e.touches.length===1){
              const dx=e.touches[0].clientX-vt.lastX;
              const dy=e.touches[0].clientY-vt.lastY;
              if(Math.abs(dx)>2||Math.abs(dy)>2)vt.dragging=true;
              vt.lastX=e.touches[0].clientX;vt.lastY=e.touches[0].clientY;
              if(vt.dragging){vt.x+=dx;vt.y+=dy;setViewOffset({x:vt.x,y:vt.y});}

              style={{height:34,padding:'0 9px',display:'inline-flex',alignItems:'center',gap:5,background:'rgba(255,255,255,.92)',color:'#3D4458',border:'1px solid rgba(231,221,234,.9)',borderRadius:3,fontFamily:'inherit',fontSize:'.66rem',fontWeight:900,cursor:'pointer',whiteSpace:'nowrap',lineHeight:1,boxShadow:'0 5px 14px rgba(126,94,148,.10)'}}>

                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:8}}>
                      <PBtn onClick={doExtract} full={false} style={{width:'100%',padding:'9px 8px',fontSize:'.74rem'}}>色を抽出する</PBtn>
                      <SBtn onClick={doAuto} full={false} style={{width:'100%',padding:'8px 8px',fontSize:'.74rem',fontWeight:700,display:'inline-flex',alignItems:'center',justifyContent:'center',gap:6}}><SolidIcon name="shuffle" size={16}/> おまかせ3色</SBtn>
                    </div>
                    {palette.length>0&&(
                      <div style={{marginBottom:12}}>
                        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
                          <div style={{fontSize:'.52rem',letterSpacing:'.08em',color:'#8A90A0',textTransform:'uppercase'}}>Palette — タップで3色選択（{colors.length}/3）</div>
                          {colors.length>0&&(
                            <button onClick={clearColors} style={{WebkitAppearance:'none',appearance:'none',background:'none',border:'none',padding:0,fontSize:'.56rem',letterSpacing:'.04em',color:'#B685C1',fontWeight:700,cursor:'pointer'}}>クリア</button>
                          )}
                        </div>
                        <div style={{display:'grid',gridTemplateColumns:'repeat(9,1fr)',gap:4}}>
                          {palette.map((hex,i)=>{
                            const sel=colors.includes(hex);
                            const selIdx=colors.indexOf(hex);
                            return(
                              <button key={hex+i} onClick={()=>toggleColor(hex)}
                                style={{WebkitAppearance:'none',appearance:'none',aspectRatio:'1',backgroundColor:hex,border:sel?'2px solid #3D4458':'1px solid rgba(0,0,0,.08)',borderRadius:6,cursor:'pointer',position:'relative',padding:0,fontSize:'5px',color:'#000',overflow:'hidden'}}>
                                {sel&&<span style={{position:'absolute',top:-3,right:-3,width:13,height:13,borderRadius:'50%',background:'#3D4458',color:'#fff',fontSize:'.42rem',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,zIndex:2}}>{selIdx+1}</span>}
                              </button>
                            );
                          })}
                        </div>
                      </div>
                    )}
                    {colors.length>0&&(
                      <>
                        {/* 最新カラー＋履歴 4列グリッド */}
                        <div style={{marginBottom:10}}>
                          <div style={{fontSize:'.52rem',letterSpacing:'.08em',color:'#8A90A0',textTransform:'uppercase',marginBottom:6}}>Colors & history</div>
                          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:5}}>
                            {colors.length>0&&(
                              <button onClick={()=>{}} style={{padding:0,background:'none',border:'2px solid #C8A8C8',borderRadius:2,cursor:'default',overflow:'visible',minHeight:29}}>
                                <div style={{fontSize:'.46rem',color:'#B685C1',fontWeight:900,letterSpacing:'.08em',lineHeight:1,marginBottom:4,textAlign:'left'}}>new</div>
                                <div style={{display:'flex',height:20,borderRadius:1,overflow:'hidden',gap:1}}>
                                  {[0,1,2].map(i=>(
                                    <div key={i} style={{flex:1,background:colors[i]||'rgba(0,0,0,.05)',border:colors[i]?'none':'1px dashed rgba(0,0,0,.15)',boxSizing:'border-box'}}/>
                                  ))}
                                </div>
                              </button>
                            )}
                            {colorHistory.slice(0,11).map((h,i)=>(
                              <button key={h.key||i} onClick={()=>{setColors(h.colors);setBgColor(h.bg);setSelBg(h.bg);}}
                                style={{padding:0,background:'none',border:`2px solid ${h.colors.join(',')===colors.join(',')?'#C8A8C8':'transparent'}`,borderRadius:2,cursor:'pointer',overflow:'visible',minHeight:29}}>
                                <div style={{fontSize:'.46rem',color:'#8C8199',fontWeight:900,letterSpacing:'.08em',lineHeight:1,marginBottom:4,textAlign:'left'}}>{String(i+1).padStart(3,'0')}</div>
                                <div style={{display:'flex',height:20,borderRadius:1,overflow:'hidden'}}>
                                  {h.colors.map(hex=>(<div key={hex} style={{flex:1,background:hex}}/>))}
                                </div>
                              </button>
                            ))}
                          </div>
                        </div>
                        {/* 背景色 */}
                        <div style={{marginBottom:6}}>
                          <div style={{fontSize:'.52rem',letterSpacing:'.08em',color:'#8A90A0',textTransform:'uppercase',marginBottom:5}}>Background 背景色</div>
                          <div style={{display:'flex',gap:6,alignItems:'center'}}>
                            <div style={{display:'flex',gap:4}}>
                              {bgSugs.map(hex=>(
                                <div key={hex} onClick={()=>{setSelBg(hex);setBgColor(hex);}}
                                  style={{width:26,height:26,background:hex,borderRadius:5,border:`2px solid ${selBg===hex?'#C8A8C8':'transparent'}`,cursor:'pointer'}}/>
                              ))}
                            </div>
                            <div style={{flex:1,position:'relative'}}>
                              <div style={{display:'flex',alignItems:'center',gap:5,padding:'5px 8px',background:'#F7F3FA',borderRadius:4,border:'1px solid #E7DDEA'}}>
                                <div style={{width:18,height:18,borderRadius:4,background:bgColor,border:'1px solid #E7DDEA',flexShrink:0}}/>
                                <span style={{fontSize:'.58rem',fontFamily:'monospace',color:'#3D4458'}}>{bgColor}</span>
                              </div>
                              <input type="color" value={bgColor} onChange={e=>{setBgColor(e.target.value);setSelBg(null);}} style={{position:'absolute',inset:0,opacity:0,width:'100%',height:'100%',cursor:'pointer'}}/>
                            </div>
                          </div>
                        </div>
                      </>
                    )}
                  </>
                )}
              </div>
            )}
            {tab==='card'&&(
              <div>
                <Lbl t="Style" sub="スタイル"/>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:7,marginBottom:10}}>
                  {[['minimal','Minimal\nChip'],['pantone','Color\nTag'],['slim','Slim\nLabel']].map(([v,l])=>(
                    <SBtn key={v} active={cardStyle===v} onClick={()=>setCardStyle(v)} full={false} style={{width:'100%',whiteSpace:'pre-line',lineHeight:1.3,padding:'9px 4px'}}>{l}</SBtn>
                  ))}
                </div>
                <Lbl t="Position" sub="左右位置"/>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:7,marginBottom:10}}>
                  {[['left','Left'],['center','Center'],['right','Right']].map(([v,l])=>(
                    <SBtn key={v} active={cardAlign===v} onClick={()=>setCardAlign(v)}>{l}</SBtn>
                  ))}
                </div>
                <Lbl t="Card Size" sub={`${cardScale}%`}/>
                <input type="range" min={70} max={120} value={cardScale} onInput={e=>setCardScale(Number(e.target.value))} onChange={e=>setCardScale(Number(e.target.value))} style={{marginBottom:8}}/>
                {colors.length===0&&<div style={{padding:'9px',background:'rgba(255,255,255,.05)',borderRadius:4,color:'rgba(255,255,255,.3)',fontSize:'.74rem',textAlign:'center',marginTop:6}}>先に色を抽出してください</div>}
              </div>
            )}

            {tab==='title'&&(
              <div>
                
            <textarea
            rows={2} placeholder="タイトル…" value={titleTxt} onChange={e=>setTitleTxt(e.target.value)} style={{marginBottom:8}}/>
            <select value={titleFont} onChange={e=>setTitleFont(e.target.value)} style={{marginBottom:7}}>
              {FONTS.map((f,i)=><option key={i} value={f.value||''} disabled={f.disabled}>{f.label}</option>)}
            </select>
            <div style={{display:'flex',gap:7,alignItems:'center',marginBottom:8}}>
              <span style={{fontSize:'.58rem',color:'#8A90A0',flexShrink:0}}>{titleSize}px</span>
              <input type="range" min={16} max={44} value={titleSize} onInput={e=>setTitleSize(Number(e.target.value))} onChange={e=>setTitleSize(Number(e.target.value))} style={{flex:1}}/>
              <input type="color" value={titleColor} onChange={e=>setTitleColor(e.target.value)} style={{width:28,height:28,border:'1px solid #E7DDEA',borderRadius:3,padding:1,cursor:'pointer',background:'none',flexShrink:0}}/>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:8}}>
              <button onClick={()=>setTitleBold(false)} style={{padding:'6px 0',background:!titleBold?'#EEE5F5':'#fff',color:!titleBold?'#3D4458':'#8A90A0',border:`1.5px solid ${!titleBold?'#D9C7E3':'#E7DDEA'}`,borderRadius:3,fontFamily:'inherit',cursor:'pointer'}}>
                <div style={{fontSize:'.7rem',fontWeight:800,lineHeight:1.1}}>Regular</div>
                <div style={{fontSize:'.48rem',fontWeight:700,opacity:.72,lineHeight:1.15,marginTop:2}}>標準</div>
              </button>
              <button onClick={()=>setTitleBold(true)} style={{padding:'6px 0',background:titleBold?'#EEE5F5':'#fff',color:titleBold?'#3D4458':'#8A90A0',border:`1.5px solid ${titleBold?'#D9C7E3':'#E7DDEA'}`,borderRadius:3,fontFamily:'inherit',cursor:'pointer'}}>
                <div style={{fontSize:'.7rem',fontWeight:900,lineHeight:1.1}}>Bold</div>
                <div style={{fontSize:'.48rem',fontWeight:700,opacity:.72,lineHeight:1.15,marginTop:2}}>太字</div>
              </button>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6}}>
              {[['left','Left'],['center','Center'],['right','Right']].map(([v,l])=>(
                <button key={v} onClick={()=>{setTitleAlign(v);setTitlePos(p=>({...p,snap:v}));}} style={{padding:'8px 0',background:titleAlign===v?'#EEE5F5':'#fff',color:titleAlign===v?'#3D4458':'#8A90A0',border:`1.5px solid ${titleAlign===v?'#D9C7E3':'#E7DDEA'}`,borderRadius:4,fontFamily:'inherit',fontSize:'.74rem',cursor:'pointer'}}>{l}</button>
              ))}
            </div>
          </div>
        )}

            {tab==='body'&&(
              <div>
                <textarea rows={3} placeholder={"ひとこと、日付、ハッシュタグなど…"} value={bodyTxt} onChange={e=>setBodyTxt(e.target.value)} style={{marginBottom:8}}/>
                <select value={bodyFont} onChange={e=>setBodyFont(e.target.value)} style={{marginBottom:7}}>
                  {FONTS.map((f,i)=><option key={i} value={f.value||''} disabled={f.disabled}>{f.label}</option>)}
                </select>
                <div style={{display:'flex',gap:7,alignItems:'center',marginBottom:8}}>
                  <span style={{fontSize:'.56rem',color:'#8A90A0',flexShrink:0}}>{bodySize}px</span>
                  <input type="range" min={11} max={28} value={bodySize} onInput={e=>setBodySize(Number(e.target.value))} onChange={e=>setBodySize(Number(e.target.value))} style={{flex:1}}/>
                  <input type="color" value={typeof bodyColor==='string'&&bodyColor.startsWith('#')?bodyColor:'#fff'} onChange={e=>setBodyColor(e.target.value)} style={{width:26,height:26,border:'1px solid rgba(255,255,255,.2)',borderRadius:5,padding:1,cursor:'pointer',background:'none',flexShrink:0}}/>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                  <span style={{fontSize:'.56rem',color:'#8A90A0',flexShrink:0,whiteSpace:'nowrap'}}>間隔 {bodyGap>0?`-${bodyGap}`:bodyGap}</span>
                  <input type="range" min={-40} max={80} value={bodyGap} onInput={e=>setBodyGap(Number(e.target.value))} onChange={e=>setBodyGap(Number(e.target.value))} style={{flex:1}}/>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:10}}>
                  <button onClick={()=>setBodyBold(false)} style={{padding:'6px 0',background:!bodyBold?'#EEE5F5':'#fff',color:!bodyBold?'#3D4458':'#8A90A0',border:`1.5px solid ${!bodyBold?'#D9C7E3':'#E7DDEA'}`,borderRadius:3,fontFamily:'inherit',cursor:'pointer',transition:'all .15s'}}>
                    <div style={{fontSize:'.7rem',fontWeight:800,lineHeight:1.1}}>Regular</div>
                    <div style={{fontSize:'.48rem',fontWeight:700,opacity:.72,lineHeight:1.15,marginTop:2}}>標準</div>
                  </button>
                  <button onClick={()=>setBodyBold(true)} style={{padding:'6px 0',background:bodyBold?'#EEE5F5':'#fff',color:bodyBold?'#3D4458':'#8A90A0',border:`1.5px solid ${bodyBold?'#D9C7E3':'#E7DDEA'}`,borderRadius:3,fontFamily:'inherit',cursor:'pointer',transition:'all .15s'}}>
                    <div style={{fontSize:'.7rem',fontWeight:900,lineHeight:1.1}}>Bold</div>
                    <div style={{fontSize:'.48rem',fontWeight:700,opacity:.72,lineHeight:1.15,marginTop:2}}>太字</div>
                  </button>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6,marginBottom:10}}>
                  {[['left','Left'],['center','Center'],['right','Right']].map(([v,l])=>(
                    <button key={v} onClick={()=>{setBodyAlign(v);setBodyPos(p=>({...p,snap:v}));}} style={{padding:'8px 0',background:bodyAlign===v?'#EEE5F5':'#fff',color:bodyAlign===v?'#3D4458':'#8A90A0',border:`1.5px solid ${bodyAlign===v?'#D9C7E3':'#E7DDEA'}`,borderRadius:4,fontFamily:'inherit',fontSize:'.74rem',cursor:'pointer'}}>{l}</button>
                  ))}
                </div>
                <Lbl t="Position" sub={`+${textOffset}px`}/>
                <input type="range" min={0} max={80} value={textOffset} onInput={e=>setTextOffset(Number(e.target.value))} onChange={e=>setTextOffset(Number(e.target.value))} style={{marginBottom:10}}/>
                {colors.length>0&&(
                  <>
                    <Lbl t="Color" sub="写真から色選択"/>
                    <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:4}}>
                      {[...colors,...bgSugs,'#3D4458','#FFFFFF'].map((hex,i)=>(
                        <div key={i} onClick={()=>{setTitleColor(hex);setBodyColor(hex);}} style={{width:26,height:26,background:hex,border:'1px solid #E7DDEA',cursor:'pointer'}} title={hex}/>
                      ))}
                    </div>
                  </>
                )}
              </div>
            )}

          </div>
        )}

        {/* タブ一覧（常に表示） */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:0}}>
          {TABS.map(({id,label,icon,done})=>(
            <button key={id} onClick={()=>setTab(tab===id?null:id)}
              style={{padding:'7px 0 6px',border:'none',background:tab===id?'#F2E9F6':'#fff',cursor:'pointer',fontFamily:'inherit',display:'flex',flexDirection:'column',alignItems:'center',gap:3,borderTop:`2px solid ${tab===id?'#C8A8C8':'transparent'}`,color:tab===id?'#3D4458':'#8A90A0'}}>
              <div style={{position:'relative',height:15,display:'grid',placeItems:'center'}}>
                <SolidIcon name={icon} size={14} color={tab===id?'#3D4458':'#A9A2B3'}/>
                {done&&tab!==id&&<span style={{position:'absolute',right:-8,top:-4,fontSize:'.42rem',color:'#C8A8C8',fontWeight:900,lineHeight:1}}>✓</span>}
              </div>
              <span style={{fontSize:'.62rem',fontWeight:tab===id?800:600,letterSpacing:'.01em'}}>{label}</span>
            </button>
          ))}
        </div>
      </div>
      {/* How to モーダル */}
      {showHowTo&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:500,padding:'20px'}}
          onClick={()=>setShowHowTo(false)}>
          <div style={{width:'100%',maxWidth:360,background:'#fff',borderRadius:4,padding:'24px',maxHeight:'80vh',overflowY:'auto'}}
            onClick={e=>e.stopPropagation()}>
            <div style={{fontFamily:"'Plus Jakarta Sans','DM Sans',sans-serif",fontWeight:700,fontSize:'1.05rem',color:'#3D4458',marginBottom:14}}>How to use</div>
            <div style={{background:'#FBF7FD',border:'1px solid #E8DDF0',borderRadius:4,padding:'12px',fontSize:'.74rem',lineHeight:1.85,color:'#667A8C',marginBottom:10}}>
              {[
                ['Photo','写真を選択'],
                ['Color','色を抽出・背景色を選ぶ'],
                ['Card','カラーカードのスタイルを選ぶ'],
                ['Title','タイトルを入力または提案から選ぶ'],
                ['Body','本文・日付などを入力'],
                ['Save','画像を保存'],
              ].map(([label,desc])=>(
                <div key={label} style={{display:'grid',gridTemplateColumns:'58px 1fr',columnGap:8,alignItems:'baseline',marginBottom:2}}>
                  <b style={{color:'#3D4458',fontWeight:800}}>{label}</b>
                  <span>— {desc}</span>
                </div>
              ))}
            </div>
            <div style={{fontWeight:600,fontSize:'.82rem',color:'#3D4458',marginBottom:6}}>プレビューの操作</div>
            <div style={{background:'#FBF7FD',border:'1px solid #E8DDF0',borderRadius:4,padding:'12px',fontSize:'.74rem',lineHeight:1.9,color:'#667A8C',marginBottom:10}}>
              ピンチで拡大縮小、ドラッグで移動<br/>
              ダブルタップで元のサイズに戻る<br/>
              タブをタップで編集パネルを開閉
            </div>
            <div style={{fontWeight:600,fontSize:'.82rem',color:'#3D4458',marginBottom:6}}>全画面で使う方法</div>
            <div style={{background:'#FBF7FD',border:'1px solid #E8DDF0',borderRadius:4,padding:'12px',fontSize:'.74rem',lineHeight:1.9,color:'#667A8C',marginBottom:10}}>
              1. Safari下部の共有ボタン（↑）をタップ<br/>
              2. 「ホーム画面に追加」を選択<br/>
              3. 「追加」→ アプリとして使える！
            </div>
            <div style={{background:'#FFF8E7',border:'1px solid #F0E0C0',borderRadius:4,padding:'12px',fontSize:'.75rem',lineHeight:1.7,color:'#8A7A60',marginBottom:16}}>
              ! 作品履歴はこのデバイスのSafariに保存されます。「Webサイトデータを消去」すると削除されます。
            </div>
            <button onClick={()=>setShowHowTo(false)}
              style={{width:'100%',padding:'12px',background:'#C8A8C8',color:'#fff',border:'none',borderRadius:4,fontFamily:'inherit',fontSize:'.9rem',fontWeight:600,cursor:'pointer'}}>
              OK
            </button>
          </div>
        </div>
      )}

      {/* Full Preview modal */}
      {showFullPreview&&(
        <div style={{position:'fixed',inset:0,background:'#000',display:'flex',flexDirection:'column',zIndex:400}}>
          <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',padding:'16px 12px 8px'}}>
            <canvas
              width={CW*RENDER_SCALE} height={CH*RENDER_SCALE}
              ref={el=>{
                if(!el||!previewRef.current)return;
                requestAnimationFrame(()=>{
                  if(!previewRef.current)return;
                  el.width=CW*RENDER_SCALE;el.height=CH*RENDER_SCALE;
                  const ctx=el.getContext('2d');
                  ctx.drawImage(previewRef.current,0,0,CW*RENDER_SCALE,CH*RENDER_SCALE);
                });
              }}
              style={{maxWidth:'100%',maxHeight:'100%',aspectRatio:'9/16',display:'block',boxShadow:'0 0 30px rgba(0,0,0,.6)'}}
            />
          </div>
          <div style={{flexShrink:0,padding:'12px 20px 40px',display:'flex',justifyContent:'center'}}>
            <button onClick={()=>setShowFullPreview(false)}
              style={{padding:'14px 48px',background:'#fff',color:'#3D4458',border:'none',borderRadius:30,fontFamily:'inherit',fontSize:'1rem',fontWeight:600,cursor:'pointer',boxShadow:'0 2px 12px rgba(0,0,0,.3)'}}>
              ✕ 閉じる
            </button>
          </div>
        </div>
      )}
      {/* Crop modal */}
      {showCrop&&img&&(
        <div style={{position:'fixed',inset:0,background:'#111',display:'flex',flexDirection:'column',zIndex:300,touchAction:'none'}}>
          <div style={{padding:'14px 20px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
            <span style={{color:'#fff',fontFamily:"'DM Sans','Plus Jakarta Sans',sans-serif",fontWeight:600,fontSize:'1rem'}}>トリミング</span>
            <span style={{color:'rgba(255,255,255,.38)',fontSize:'.62rem',letterSpacing:'.07em'}}>ドラッグして枠を作成</span>
          </div>
          <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',minHeight:0}}>
            <canvas ref={cropCvRef} style={{maxWidth:'100%',maxHeight:'100%',display:'block',touchAction:'none'}}/>
          </div>
          <div style={{padding:'14px 20px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,flexShrink:0}}>
            <button onClick={()=>{setFitMode('contain');setFinalCrop(null);setShowCrop(false);}}
              style={{padding:'13px',border:'1px solid rgba(255,255,255,.2)',borderRadius:4,background:'transparent',color:'rgba(255,255,255,.7)',fontSize:'.84rem',cursor:'pointer',fontFamily:'inherit'}}>
              そのまま使う
            </button>
            <button onClick={()=>{if(crop&&crop.w>10){setFinalCrop(crop);setFitMode('trim');setShowCrop(false);}}}
              disabled={!crop||crop.w<10}
              style={{padding:'13px',background:crop&&crop.w>10?'#fff':'rgba(255,255,255,.15)',color:crop&&crop.w>10?'#1A1A1A':'rgba(255,255,255,.3)',border:'none',borderRadius:4,fontSize:'.84rem',cursor:crop&&crop.w>10?'pointer':'default',fontFamily:'inherit',fontWeight:500}}>
              Apply ✓
            </button>
          </div>
        </div>
      )}

      <canvas ref={hiddenRef} style={{display:'none'}}/>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<PaletteStory/>);
</script>
</body>
</html>
